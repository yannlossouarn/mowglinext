map_server_node:
  ros__parameters:
    resolution: 0.05
    map_size_x: 20.0
    map_size_y: 20.0
    map_frame: "map"
    decay_rate_per_hour: 0.1
    tool_width: 0.18
    map_file_path: ""
    areas_file_path: "/ros2_ws/maps/areas.dat"
    publish_rate: 1.0

    # Small garden: 9x7m mowing area (0.5m inset from 10x8m walls).
    # Robot starts at origin, dock at (-4, -3).
    area_names: ["small_garden"]
    area_polygons: ["-4.5,-3.5;4.5,-3.5;4.5,3.5;-4.5,3.5"]
    area_is_navigation: [false]
    area_obstacles: [""]

map_server_node:
  ros__parameters:
    resolution: 0.05
    map_size_x: 20.0
    map_size_y: 20.0
    map_frame: "map"
    decay_rate_per_hour: 0.1
    # tool_width is the single source of truth for the blade's effective
    # cutting width. Injected at launch from mowgli_robot.yaml.tool_width
    # (see navigation.launch.py) so this YAML only needs to keep the
    # node-internal default that backs the test harness; production
    # value comes from the per-site config.
    tool_width: 0.18
    map_file_path: ""
    areas_file_path: "/ros2_ws/maps/areas.dat"
    publish_rate: 1.0
    # Navigation margin around area boundaries for keepout mask.
    # Cells outside the area but within this distance of the boundary
    # edge are marked FREE (not lethal) in the keepout mask. Needed so
    # the dock (often just outside the mowing polygon) can be reached
    # and so the robot doesn't immediately self-reject as "Start
    # occupied" when RTK drift puts it 10 cm past the edge.
    #
    # Previously 1.5 m — but that let Nav2's Smac planner route transit
    # paths up to 1.5 m OUTSIDE the polygon during inter-strip turns.
    # Combined with FTC tracking error, the robot would sit ~1 m past
    # the polygon edge during corner-cutting, fire BoundaryGuard, and
    # trigger emergency stop — even though the strip endpoints
    # themselves respected strip_boundary_margin_m.
    #
    # 0.3 m: still covers non-RTK drift and dock approach (dock is
    # typically within 0.2 m of polygon edge on a well-recorded site),
    # but stops the planner from drafting big detours outside the area.
    keepout_nav_margin: 0.3

    # /local_costmap published values are 0–100 (OccupancyGrid units, with
    # the Nav2 costmap_2d → OccupancyGrid mapping: internal 254/253 →
    # OG 100/99, inflation 100..252 → OG ~80, free → 0).  Default 80 was
    # too sensitive: ordinary inflation around the LiDAR-detected
    # obstacles triggered `is_costmap_blocked`, which is_costmap_blocked
    # callers use to gate strip cells. Combined with the 3 s reachability
    # recompute, this caused 1000+-cell DEAD/LAWN flips every cycle and
    # made GetNextSegment return empty paths after a few strips. 99
    # restricts the keepout to lethal-or-inscribed cells only — the
    # robot footprint genuinely cannot fit there — and matches the FTC's
    # checkCollision threshold.
    costmap_obstacle_threshold: 99

    # Strip inset: distance from polygon edge to strip endpoints. Must
    # exceed the worst-case overshoot of the active controller. With
    # RotationShim+DWB (current setup) the rollout sim_time=1.0 s at
    # max_vel_x=0.30 m/s means DWB can project the robot up to 0.30 m
    # past the strip endpoint before the goal-checker fires; carrot
    # lookaheads add ~0.6 m more in the worst case. 1.20 m absorbs all
    # that with margin and stops the robot from clipping the polygon
    # edge on every headland turn (the 4 boundary violations we saw on
    # run 31 with 0.80 m). Effective mowable area is still ~ polygon -
    # 2.4 m on each axis (e.g. 9×6 polygon → 6.6×3.6 m of strips =
    # 24 m², well above the dock-only minimum).
    strip_boundary_margin_m: 1.20

    # Mowing strip angle in degrees. NaN (default) = auto-compute from
    # polygon shape (minimum bounding rectangle — strips align with the
    # longest axis to minimise turns). 0 = north-south, 90 = east-west.
    # 90 explicit: garden polygon (-7,-3)..(2,3) has its long axis on
    # X (9 m vs 6 m on Y). Auto-compute was returning a diagonal angle
    # in some configurations, producing oblique strips that fragmented
    # at every polygon edge crossing. 90° forces clean east-west rows
    # — full polygon-width strips with the minimum number of headland
    # turns. Restore .nan once auto-compute is debugged.
    mow_angle_deg: 90.0

    # Inner-boundary margin. Cells INSIDE a mowing area but within this
    # distance of the nearest edge are marked LETHAL in the keepout mask.
    # Intended to push Nav2 transit paths away from the polygon edge, but
    # in practice it creates dead zones the planner can't escape when
    # pose drift puts the robot near the edge — especially near the
    # dock, which is often <0.5 m from the polygon boundary.
    # Set to 0 to disable. Boundary enforcement remains via the outside
    # keepout (cells outside any polygon → lethal) and the BT
    # BoundaryGuard tripwire.
    boundary_inner_margin_m: 0.0

    # Pre-defined mowing / navigation areas (OpenMower-style).
    # Parallel arrays indexed by position. Polygon format: "x1,y1;x2,y2;..."
    #
    # Areas are populated by the GUI's recording flow
    # (COMMAND_RECORD_AREA → COMMAND_RECORD_FINISH → /map_server_node/add_area)
    # and persisted to areas.dat. Shipping a non-empty default would make
    # a fresh install attempt to mow a phantom polygon anchored at the
    # GPS datum the moment COMMAND_START fires.
    #
    # The four `area_*` arrays are intentionally NOT declared here — when
    # YAML omits them, declare_parameter() in area_manager.cpp falls back
    # to its empty-vector default. (ROS2 cannot infer the element type of
    # an empty YAML array literal `[]`, which throws "No parameter value
    # set" at lifecycle bring-up.) The simulation overrides these arrays
    # from sim_full_system.launch.py to inject its test field.

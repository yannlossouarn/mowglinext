# Nav2 parameters for Mowgli outdoor robot mower.
# Controller:   mowgli_nav2_plugins/FTCController (Follow-The-Carrot PID
#               with three decoupled channels + obstacle-skirting via
#               lateral carrot deviation). Used for both FollowPath
#               (transit) and FollowCoveragePath (strips).
# Planner:      nav2_smac_planner/SmacPlanner2D.
# Coverage:     cell-based strip planner in mowgli_map (not nav2_coverage).
# Costmaps:     outdoor operation with LiDAR /scan (filtered via
#               costmap_scan_filter_node into /scan_costmap).

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    # 60 ms — Nav2 default is 20 ms (NOT 1.0 s as a previous comment
    # claimed). 3× the default to absorb ARM scheduler jitter on
    # blackboard service calls without making timeouts feel sluggish.
    default_server_timeout: 60
    # Default is 1.0 s — observed on ARM that planner_server / controller_server
    # finish lifecycle transition to active before bt_navigator but their
    # action servers (compute_path_to_pose / follow_path) are not fully
    # registered in the DDS graph yet, so bt_navigator's BT creation fails
    # with "action server not available" and lifecycle_manager aborts
    # bring-up. 10 s is cheap insurance; it only waits longer on startup.
    wait_for_service_timeout: 10000
    # Custom Nav2 BT that adds GoalCheckerSelector (required when multiple
    # goal_checker_plugins are configured in controller_server).
    # Paths are injected by navigation.launch.py via RewrittenYaml — keep empty here.
    default_nav_to_pose_bt_xml: ""
    default_nav_through_poses_bt_xml: ""
    # plugin_lib_names: auto-loaded in Kilted — no manual list needed.
    enable_stamped_cmd_vel: true

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

# ---------------------------------------------------------------------------
# Controller server
# ---------------------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    # 10 Hz min: 0.3 m/s × 100 ms = 3 cm of motion between decisions; matches
    # the 5-10 Hz upstream costmap / GPS refresh. 20 Hz cuts the
    # perception-to-action loop by half, useful for the FTC PID lateral
    # corrections at strip endpoints.
    controller_frequency: 20.0
    # 5s vs 0.3s default — ARM scheduler jitter can stall local_costmap
    # updates 2-3s under load; the controller would error out otherwise.
    costmap_update_timeout: 5.0
    # 0.08 m/s zeroes outputs below the firmware ~PWM 40 deadband so the
    # motors don't buzz instead of moving. Matches hardware_bridge deadband.
    min_x_velocity_threshold: 0.08
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["stopped_goal_checker", "coverage_goal_checker"]
    controller_plugins: ["FollowPath", "FollowCoveragePath"]

    progress_checker:
      # PoseProgressChecker counts rotation as progress: headland corners
      # involve extended pivot-in-place where the chassis hardly translates.
      # SimpleProgressChecker fired "Failed to make progress" mid-pivot
      # even with 90 s allowance.
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.15
      required_movement_angle: 0.5     # rad (~28°), gates corner pivots
      movement_time_allowance: 30.0

    stopped_goal_checker:
      plugin: "nav2_controller::StoppedGoalChecker"
      trans_stopped_velocity: 0.10
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 0.5

    # Coverage strip endpoint validation.
    #
    # PathProgressGoalChecker (mowgli_nav2_plugins) — subscribes to
    # FTC's republished `<plugin_name>/global_plan` and only fires when
    # the robot has monotonically tracked >= `progress_threshold` of
    # the path's poses AND is within xy/yaw tolerance of the goal pose.
    #
    # Why: SimpleGoalChecker and StoppedGoalChecker both fire on
    # proximity-to-goal alone (the latter also gates on velocity, but
    # FTC's PRE_ROTATE pivots in place with lin_vel≈0 — the velocity
    # gate matches mid-traversal). F2C coverage paths can end near the
    # perimeter, where the robot also passes during headland mowing.
    # We measured FollowPath actions completing at <2 % coverage with
    # both legacy checkers. Gating on PATH PROGRESS (idx ≥ 95 % of the
    # plan size) is the only definition of "done" that survives a
    # coverage path whose start and end are both inside the headland
    # ring.
    #
    # plan_topic must match the controller publishing the plan we
    # follow — FTC publishes on `<plugin_name>/global_plan`, so for
    # the FollowCoveragePath slot the full path is
    # `/controller_server/FollowCoveragePath/global_plan`.
    coverage_goal_checker:
      plugin: "mowgli_nav2_plugins/PathProgressGoalChecker"
      progress_threshold: 0.95
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 0.30
      plan_topic: "/controller_server/FollowCoveragePath/global_plan"

    # FollowPath (transit) — FTCController. Same plugin as FollowCoveragePath
    # since FTC handles both pivots and obstacle deviation natively.
    FollowPath:
      plugin: "mowgli_nav2_plugins/FTCController"
      speed_fast: 0.20
      speed_fast_threshold: 0.5
      speed_fast_threshold_angle: 10.0
      speed_slow: 0.12
      speed_angular: 45.0              # deg/s — matches OpenMower ftc_local_planner
      acceleration: 0.2
      kp_lon: 1.0
      ki_lon: 0.0
      kd_lon: 0.0
      kp_lat: 2.0
      ki_lat: 0.0
      kd_lat: 1.0
      kp_ang: 1.5
      ki_ang: 0.0
      kd_ang: 0.0
      max_cmd_vel_speed: 0.30
      max_cmd_vel_ang: 0.8
      max_goal_distance_error: 0.10
      max_goal_angle_error: 15.0       # deg
      goal_timeout: 10.0
      max_follow_distance: 2.0
      # forward_only=false: FTC may follow path segments in reverse when
      # the carrot is behind the robot (typical at strip-end U-turns).
      # Tried forward_only=true to fix reverse-into-obstacle (session
      # 2026-05-11-with-obstacle) but it deadlocked in a ±180° PRE_ROTATE
      # pirouette whenever the carrot landed near directly behind the
      # robot — sign of the rotation error flipped every tick, cmd_wz
      # alternated -0.8 / +0.8, robot stuck spinning (session
      # 2026-05-11-obstacle-realtime-fwd-only at t≈815s, yaw oscillated
      # +81°→-77°→+99° in 6s). The earlier obstacle penetration was a
      # Webots kinematic_drive artifact (teleports through solids
      # without collision force), not a real navigation gap that
      # forward_only would prevent.
      forward_only: false
      check_obstacles: true
      # 30 points ≈ 1.5 m of path lookahead at the F2C 0.05 m sampling.
      # Was 5 (=25 cm) which left FTC almost no warning before it had to
      # deviate; the robot would graze obstacles with 5–10 cm offsets
      # instead of properly skirting them. 1.5 m gives ~7 s of reaction
      # time at the 0.20 m/s mowing speed.
      obstacle_lookahead: 30
      obstacle_footprint: true
      # Obstacle deviation: when the lookahead path crosses a lethal cell,
      # FTC laterally offsets the carrot to skirt the obstacle instead of
      # aborting. Tuning:
      #   * max_lateral_deviation: hard ceiling. If the algorithm needs more
      #     than this to find a clear path, throw ControllerException so the
      #     BT can request a replan (next strip).
      #   * deviation_step: increment per attempt while searching for a clear
      #     offset. 0.05 m gives ~30 attempts to reach 1.5 m.
      #   * deviation_blend_rate: m/s decay rate when blending back to the
      #     original path after the obstacle clears.
      enable_obstacle_deviation: true
      max_lateral_deviation: 1.5
      deviation_step: 0.05
      deviation_blend_rate: 0.5

    # FollowCoveragePath — strip following. Same FTC plugin, same params as
    # FollowPath (single source of truth). The two slots exist for future
    # divergence (e.g. tighter lateral PID for strips), not because the
    # controller differs today.
    FollowCoveragePath:
      plugin: "mowgli_nav2_plugins/FTCController"
      speed_fast: 0.20
      speed_fast_threshold: 0.5
      speed_fast_threshold_angle: 10.0
      speed_slow: 0.12
      speed_angular: 45.0
      acceleration: 0.2
      kp_lon: 1.0
      ki_lon: 0.0
      kd_lon: 0.0
      kp_lat: 2.0
      ki_lat: 0.0
      kd_lat: 1.0
      kp_ang: 1.5
      ki_ang: 0.0
      kd_ang: 0.0
      max_cmd_vel_speed: 0.30
      max_cmd_vel_ang: 0.8
      # FTC's internal acceptance tolerance for WAITING_FOR_GOAL_APPROACH.
      # With the F2C v2 server (mowgli_coverage) producing per-sub-cell
      # paths chained via Dubins connectors, the LAST pose of the
      # combined path can sit 25-50 cm from where FTC's PID can
      # converge — the connector geometry biases the final approach
      # angle and PID can't drive that distance to zero in 10 s.
      # Bumping to 0.30 m lets WAITING_FOR_GOAL_APPROACH succeed at
      # the actual converged distance instead of looping FollowStrip
      # forever. PathProgressGoalChecker still has the progress
      # gate (>=95% of path indices visited), so a robot that's 30 cm
      # from the goal but only at 50% progress doesn't false-fire.
      max_goal_distance_error: 0.30
      max_goal_angle_error: 15.0
      goal_timeout: 10.0
      max_follow_distance: 2.0
      # forward_only=false: FTC may follow path segments in reverse when
      # the carrot is behind the robot (typical at strip-end U-turns).
      # Tried forward_only=true to fix reverse-into-obstacle (session
      # 2026-05-11-with-obstacle) but it deadlocked in a ±180° PRE_ROTATE
      # pirouette whenever the carrot landed near directly behind the
      # robot — sign of the rotation error flipped every tick, cmd_wz
      # alternated -0.8 / +0.8, robot stuck spinning (session
      # 2026-05-11-obstacle-realtime-fwd-only at t≈815s, yaw oscillated
      # +81°→-77°→+99° in 6s). The earlier obstacle penetration was a
      # Webots kinematic_drive artifact (teleports through solids
      # without collision force), not a real navigation gap that
      # forward_only would prevent.
      forward_only: false
      check_obstacles: true
      # 30 points ≈ 1.5 m of path lookahead at the F2C 0.05 m sampling.
      # Was 5 (=25 cm) which left FTC almost no warning before it had to
      # deviate; the robot would graze obstacles with 5–10 cm offsets
      # instead of properly skirting them. 1.5 m gives ~7 s of reaction
      # time at the 0.20 m/s mowing speed.
      obstacle_lookahead: 30
      obstacle_footprint: true
      enable_obstacle_deviation: true
      max_lateral_deviation: 1.5
      deviation_step: 0.05
      deviation_blend_rate: 0.5

# ---------------------------------------------------------------------------
# Planner server
# ---------------------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.50
      downsample_costmap: false
      downsampling_factor: 2
      allow_unknown: false
      max_iterations: 100000
      max_on_approach_iterations: 1000
      max_planning_time: 3.5
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

# ---------------------------------------------------------------------------
# Smoother server
# ---------------------------------------------------------------------------
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ---------------------------------------------------------------------------
# Recoveries / Behavior server
# ---------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    # Kilted+ renamed costmap_topic / footprint_topic to local_*_topic
    # (with global_* siblings); the un-prefixed keys are silently ignored.
    # Values match Nav2's local-costmap defaults so this is purely
    # explicit-is-better-than-implicit.
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    # 0.5s sim-ahead (at 0.15 m/s BackUp ≈ 7.5 cm) catches immediate
    # collisions without aborting on phantom LETHAL cells 30-50 cm behind
    # (often map→odom jump artefacts or dock residue). 2.0s refused every
    # undock.
    simulate_ahead_time: 0.5
    # 2.5 rad/s (was 1.0) — robot can do ~3.14 rad/s on the bench
    # (360° in ~2 s). Spin recovery should use the real envelope so a
    # 90° recovery turn finishes in ~0.6 s instead of 1.6 s.
    max_rotational_vel: 2.5
    # 0.85 rad/s ≈ wheel vel 0.14 m/s per wheel (PWM 42 > deadband).
    # Lower floor let Spin behavior dither at sub-deadband ω.
    min_rotational_vel: 0.85
    rotational_acc_lim: 5.0

# ---------------------------------------------------------------------------
# Waypoint follower
# ---------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

# velocity_smoother removed 2026-04-26 — caps live in the controllers
# (FTC max_cmd_vel_speed/ang, RPP desired_linear_vel) and the firmware
# deadband; an extra ramp layer here only added latency and confused
# tuning. cmd_vel pipeline now skips this hop.

# ---------------------------------------------------------------------------
# Global costmap
# ---------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      # 2 Hz after the 2026-04-24 shrink from 30×30 to 20×20 m (160 k cells
      # vs 360 k). Previously capped at 1 Hz because obstacle_layer raycast
      # over the larger grid ate ARM CPU; the 44 % smaller grid gives
      # enough headroom to double both the update and publish rates, which
      # roughly halves the costmap-contributed Foxglove visual lag.
      update_frequency: 2.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      # TF tolerance: how stale a transform can be before the costmap rejects
      # it. At 0.8 rad/s max angular velocity the old 5.0s allowed up to 229°
      # of rotation error on cached TFs — exactly the "pollution during
      # rotation" symptom observed on the 2026-04-24 mow test. 0.5 s still
      # absorbs the ~300 ms ARM scheduler jitter that motivated the earlier
      # bump, while capping the per-scan rotation smear at ≤22°.
      transform_tolerance: 0.5
      # Experiment 2026-04-24: switch to delta mode (default). The old
      # comment blamed an isCurrent() bug in Nav2 for needing
      # always_send_full_costmap=true, but the Kilted release may have
      # fixed it. If the controller_server starts failing goals with
      # error 107 ("costmap not current"), revert to true. The delta
      # path publishes full snapshot on first connect + only changed
      # cells via /*_costmap_updates thereafter, cutting the steady
      # state publish cost dramatically.
      always_send_full_costmap: false
      # Footprint computed from mowgli_robot.yaml at launch time
      footprint: "[[0.50, 0.20], [0.50, -0.20], [-0.10, -0.20], [-0.10, 0.20]]"
      resolution: 0.05
      track_unknown_space: false
      # Rolling window large enough to cover transit across any garden.
      # Unknown space is treated as free (track_unknown_space: false) so the
      # planner can plan through unmapped areas — the robot will discover
      # obstacles via LiDAR as it drives.  This supports arbitrarily large
      # gardens: the costmap always centres on the robot, and obstacles are
      # detected in real time by the obstacle_layer.
      rolling_window: true
      # 20×20 m rolling window (was 30×30). At resolution 0.05 m that is
      # 400×400 = 160 k cells instead of 360 k — roughly 44 % of the data
      # per publish tick, which brings the full-costmap publish rate back
      # close to the 2 Hz target on ARM (was 1.3 Hz measured). LD19 useful
      # range is 8 m and robot top speed is 0.3 m/s, so a 10 m planning
      # radius from the rolling-window centre is still well beyond what
      # Smac needs for strip-to-strip transit.
      width: 20
      height: 20
      # keepout_filter makes the polygon boundary visible to the Smac planner
      # so transit paths never exit the mowing area. `keepout_nav_margin_` in
      # map_server_node (default 1.5m) leaves a free band outside the polygon
      # edges so the dock and transit corridor aren't blocked. The standalone
      # /boundary_violation topic remains as a last-resort tripwire for
      # localization faults. Local costmap stays filter-free so Nav2 local
      # recoveries (spin, backup) still function near edges.
      # inflation_layer is listed AFTER keepout so keepout lethals don't get
      # inflated outward, which would bleed into the free margin and block
      # the dock.
      plugins: ["obstacle_layer", "keepout_filter", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        # No persistence: heading drift causes wall duplicates
        observation_persistence: 0.0
        observation_sources: scan
        scan:
          topic: /scan
          # LaserScan is projected to 3D via laser_geometry then filtered by
          # map-frame Z. With ground_constraint keeping base_link Z ≈ 0,
          # lidar is at +0.22 m. Any scan return at Z below 0.08 m is
          # either ground (on a pitched/rolling robot whose scan plane tilts
          # downward) or below the mower skirt and irrelevant. Above 1.5 m
          # is overhead (tree canopy, umbrellas) the mower won't hit.
          # Previously 200 m which was a workaround for old Z-drift bug;
          # now fixed by the ground constraint so we can filter properly.
          # 2D LaserScan rays are at lidar_link.z (≈0.22 m). After TF
          # to map their per-point Z is constant ≈ lidar height. With
          # min_obstacle_height: 0.08 used to exclude valid LiDAR
          # returns in some sim configurations (LaserScan rays project
          # at constant lidar_link.z ≈ 0.22 m), leaving the costmap
          # empty so obstacle_tracker had nothing to surface. 0 keeps
          # every projected return; the upper bound (max_obstacle_height
          # below) handles ceiling/canopy filtering.
          min_obstacle_height: 0.0
          max_obstacle_height: 1.5
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 5.0
          # Lowered from 0.50 m → 0.10 m so the global costmap sees the
          # same near-field obstacles as the local costmap. Ground/grass
          # clutter is filtered by the min_obstacle_height band (0.08 m
          # floor) now that ground_constraint keeps base_link Z ≈ 0, so
          # we don't need a radial guard band on top of it. The Smac
          # planner's keepout_filter handles dock avoidance on the
          # global side — no need to mask the dock here.
          obstacle_min_range: 0.10
          inf_is_valid: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        # 0.20 m (was 0.40). With keepout_nav_margin=0.3 m and robot
        # footprint ±0.20 m lateral, 0.40 m inflation made the footprint
        # corners land inside the inflated zone whenever the robot was
        # within ~0.44 m of the polygon edge — Smac reported "Start
        # 0.20 m (reverted from 0.30): with a 9×6 m polygon and
        # auto-promoted obstacles in the middle, 0.30 m inflation
        # blocked all transit paths between cells — robot got stuck
        # in TRANSIT for 9+ min unable to reach any headland start.
        # Smac's "Inflation layer ... not set sufficiently" warning
        # is performance, not correctness — planner falls back to
        # per-footprint checking. collision_monitor PolygonStop
        # remains the runtime safety guard.
        inflation_radius: 0.20

      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/costmap_filter_info"

# ---------------------------------------------------------------------------
# Local costmap
# ---------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      # update_frequency > controller_frequency (5 Hz) so the costmap is always
      # fresh when the controller ticks. publish_frequency kept low because
      # only the visualisation consumes the topic; OpenMower uses 5/2.
      update_frequency: 10.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      # 0.5 s: balances ARM ~300 ms scheduler jitter against rotation-smear
      # in scan projection. The 5.0 s value used before the 2026-04-24
      # robot_localization test let stale TFs up to 229° out of date drive
      # obstacle placement when the robot was rotating.
      transform_tolerance: 0.5
      # Force periodic full publishes. Without this (default false), the
      # costmap only publishes when its map changes — but with only the
      # inflation_layer and no obstacle source, the map rarely changes,
      # so the publish thread stays idle and isCurrent() never flips true.
      always_send_full_costmap: true
      footprint: "[[0.50, 0.20], [0.50, -0.20], [-0.10, -0.20], [-0.10, 0.20]]"
      resolution: 0.05
      rolling_window: true
      # 12×12 m local costmap. The 13 m headland walk plus FTC's
      # ~2 m max_follow_distance means the robot's lookahead window
      # routinely sits 3-5 m from base_footprint; a 6 m costmap
      # truncated the obstacle signal mid-strip (planner replans
      # blind, controller hits unfiltered LiDAR returns). 12 m gives
      # ~6 m radius around base_footprint, enough for any one strip
      # plus its end-of-segment pivot.
      width: 12
      height: 12
      # keepout_filter removed: it marks boundary as LETHAL in the local
      # costmap which triggers RPP "collision ahead" on swaths near the
      # boundary edge. Boundary enforcement is handled by the coverage
      # planner (swaths stay within the polygon) and the collision_monitor
      # (real LiDAR obstacles only). Speed filter also removed as it depends
      # on the same mask infrastructure.
      # Obstacle layer ENABLED so FTCController's obstacle lookahead
      # (check_obstacles=true, obstacle_lookahead=5) can avoid LiDAR-seen
      # obstacles on coverage paths. Collision_monitor alone (PolygonSlow
      # at 30%) was letting the robot creep into walls during FollowStrip.
      # observation_persistence=0 keeps the dock cleared when the robot
      # drives away from it, so it doesn't block BackUp on the next cycle.
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        # Short non-zero persistence (was 0): smooths over the inevitable
        # 1–2 missing scans during ARM TF jitter so transient obstacles
        # don't flicker out of the costmap mid-strip. Long persistence
        # would re-introduce the dock-residue problem post-undock; 2 s
        # is short enough that costmap_scan_filter's 5 s post-undock
        # grace window still clears any dock returns before they expire.
        observation_persistence: 2.0
        # Subscribe to the conditional /scan_costmap stream from
        # costmap_scan_filter_node — same scan as /scan but with returns
        # under dock_blank_range pushed to +inf while is_charging or for
        # post_undock_blank_sec after charging drops. With that filter
        # owning the dock-mask logic, obstacle_min_range can drop to a
        # near-LiDAR floor and the 0.10–0.65 m mowing blind ring closes.
        observation_sources: scan_filtered
        scan_filtered:
          topic: /scan_costmap
          # Same height band as the global obstacle_layer — filter ground
          # hits when the mower pitches on uneven terrain.
          # 2D LaserScan rays are at lidar_link.z (≈0.22 m). After TF
          # to map their per-point Z is constant ≈ lidar height. With
          # min_obstacle_height: 0.08 used to exclude valid LiDAR
          # returns in some sim configurations (LaserScan rays project
          # at constant lidar_link.z ≈ 0.22 m), leaving the costmap
          # empty so obstacle_tracker had nothing to surface. 0 keeps
          # every projected return; the upper bound (max_obstacle_height
          # below) handles ceiling/canopy filtering.
          min_obstacle_height: 0.0
          max_obstacle_height: 1.5
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          # Lowered from 0.65 m → 0.10 m. The dock-mask is now handled
          # by costmap_scan_filter_node (charging-state aware), so this
          # only needs to filter LiDAR self-returns near the housing.
          # 0.10 m closes the previous 0.10–0.65 m blind ring during
          # mowing — collision_monitor and Nav2 now agree on what's
          # in front of the robot.
          obstacle_min_range: 0.10
          inf_is_valid: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        # 0.30 m matches the global costmap inflation. FTC reads
        # inflation cells via checkCollision() / obstacle_lookahead
        # — only LETHAL (cost ≥ 253) cells trigger lateral deviation,
        # so a moderate inflation gradient is informational rather
        # than action-forcing.
        inflation_radius: 0.30

# ---------------------------------------------------------------------------
# Map server / AMCL (unused — map->odom is published by ekf_map_node
# (default) or fusion_graph_node (opt-in via use_fusion_graph);
# kept for completeness / Nav2 lifecycle compatibility)
# ---------------------------------------------------------------------------
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# ---------------------------------------------------------------------------
# Docking server (opennav_docking)
# ---------------------------------------------------------------------------
docking_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    # 10 Hz (was 2 Hz): tighter approach control + faster polling of
    # isDocked()/isCharging() so the robot stops within ~100 ms of the
    # charging signal arriving rather than up to ~500 ms. Not high
    # enough to starve Nav2/robot_localization on ARM.
    controller_frequency: 20.0
    initial_perception_timeout: 5.0
    # Firmware sets STATUS_BIT_CHARGING only after its own ADC debounce
    # (~2-3 s on this platform). 5 s barely covered that; 10 s gives a
    # comfortable margin while still failing fast if physical contact
    # never actually happens.
    wait_charge_timeout: 10.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: base_footprint
    fixed_frame: odom
    # docking_server-level dock_backwards is deprecated in Kilted+; the
    # replacement (dock_direction) lives PER-PLUGIN under
    # simple_charging_dock below. Keep dock_backwards: false here only as
    # an explicit guard — top-level dock_direction is silently ignored.
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    # Disable the docking controller's internal collision check. It
    # projects the dock-approach trajectory through the local_costmap
    # and aborts if any cell exceeds dock_collision_threshold — but the
    # dock structure itself shows up in the obstacle layer as soon as
    # the LiDAR sees it, so the controller refuses its own destination
    # and DockRobot times out with "Failed to get control / Timed out
    # resetting dock approach". collision_monitor (downstream of nav2,
    # always active) still enforces the chassis-polygon emergency stop,
    # so disabling the docking-internal check doesn't remove safety —
    # it just stops the docking server from refusing to dock at the dock.
    controller.use_collision_detection: false
    # Graceful-controller velocity envelope. Defaults (v_linear_max ≈ 0.25
    # m/s, slowdown_radius ≈ 0.25 m) are tuned for larger AMRs and let
    # the mower hit the dock at near-transit speed: with docking_threshold
    # 0.05 m the controller only has ~200 ms between "in tolerance" and
    # contact, so the robot regularly overshoots / bounces off / misses
    # the cradle. Halving v_linear_max and doubling slowdown_radius gives
    # a calm ~5 cm/s final approach with plenty of braking distance for
    # the 10 Hz controller loop to detect charging and stop cleanly.
    controller.v_linear_min: 0.05
    controller.v_linear_max: 0.12
    controller.v_angular_max: 0.5
    controller.slowdown_radius: 0.5
    # Named dock instances — BT uses dock_id="home_dock"
    dock_plugins: ["simple_charging_dock"]
    docks: ["home_dock"]
    home_dock:
      type: "simple_charging_dock"
      frame: map
      pose: [0.0, 0.0, 0.0]  # Overridden at launch from dock_pose_x/y/yaw params
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      # Forward dock approach (matches the YardForce charger contact
      # geometry — robot drives nose-first into the dock).
      dock_direction: "forward"
      # 0.1 A (default 0.5 A): the YardForce charger sources >0.1 A
      # almost immediately on contact; 0.5 A would add ~1 s of delay
      # before is_charging_ flips and the BT considers the dock reached.
      charging_threshold: 0.1
      # Geometric distance (m) from base_link to dock pose for isDocked().
      # RTK-Fixed gives σ ~3 mm, so 0.05 m is a comfortable envelope
      # covering antenna-lever-arm effects and short GPS glitches.
      docking_threshold: 0.05
      # 1.5 m straight-line approach: matches dock_approach_corridor_length_m
      # in map_server_node (no-mow zone in front of dock). With only 1.0 m,
      # if RPP arrived at staging with the cap still slightly off (allowed
      # by dock_prestaging_tolerance: 0.5 m), opennav_docking did not have
      # enough straight-line length to redress and the robot hit the dock
      # at an angle ("en biais"). 1.5 m gives the graceful approach
      # controller room to converge before contact.
      staging_x_offset: -1.5
      use_external_detection_pose: false
      use_battery_status: true
      battery_topic: "/battery_state"
      use_stall_detection: false
      filter_coef: 0.1

# ---------------------------------------------------------------------------
# Collision monitor
# ---------------------------------------------------------------------------
collision_monitor:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    base_frame_id: base_footprint
    odom_frame_id: odom
    cmd_vel_in_topic: cmd_vel_nav
    # 2026-04-26: bypass velocity_smoother (now removed). Output goes
    # straight to twist_mux on cmd_vel_monitored.
    cmd_vel_out_topic: cmd_vel_monitored
    state_topic: collision_monitor_state
    transform_tolerance: 0.5
    # Source timeout: how long before stale sensor data triggers a stop.
    # ARM boards can have TF/scan timing jitter — 5s avoids false stops
    # while still catching genuinely dead sensors.
    source_timeout: 5.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    # PolygonStop is intentionally DISABLED. Two-layer safety story:
    #
    #   (a) FTCController's `enable_obstacle_deviation` + `obstacle_lookahead=30`
    #       (~1.5 m of path) re-routes the robot AROUND LiDAR-seen obstacles
    #       *while* it follows the F2C path. The fallback is a soft slowdown
    #       via PolygonSlow below.
    #
    #   (b) The STM32 firmware is the sole emergency-stop authority
    #       (CLAUDE.md invariant 9). Lift, tilt, blade-jam, bumper, e-stop —
    #       all of them route through firmware and bypass /cmd_vel entirely.
    #
    # PolygonStop kept firing whenever an obstacle we had ALREADY steered
    # around was still inside the chassis +5 cm box (it lingers there for a
    # few seconds after passing). That permanently froze cmd_vel and forced
    # PRE_ROTATE timeouts. Re-enabling PolygonStop here would require a
    # forward-only polygon (rear half ignored) AND a tighter min_points
    # threshold — out of scope until we get LiDAR-based fall detection
    # ready. Audit 2026-05-12 flagged this and accepted the trade-off; see
    # CLAUDE.md "Architecture Invariants" for the safety layering.
    #
    # The PolygonStop *definition* below is retained as documentation of
    # the intended chassis-relative polygon — it just isn't in the active
    # polygons list.
    polygons: ["PolygonSlow"]
    PolygonStop:
      type: "polygon"
      # INSIDE the chassis on Y (chassis half-width 0.20, polygon at
      # ±0.18) so any LiDAR return from our own chassis edge falls
      # OUTSIDE the polygon and doesn't trip a stop. Forward extent
      # still well past the chassis front (chassis front edge at
      # base_link +0.48). Coords are
      # [forward_left, forward_right, rear_right, rear_left] in
      # base_footprint frame.
      # NOTE: this loses some real-obstacle protection vs. the
      # production "chassis + 5 cm" target (originally ±0.25). The
      # right long-term fix is a chassis-blank filter on /scan,
      # tracked separately.
      points: "[[0.55, 0.18], [0.55, -0.18], [-0.15, -0.18], [-0.15, 0.18]]"
      action_type: "stop"
      # 8 points: tight enough that a single stray return doesn't trip
      # a stop, loose enough that a real obstacle (legs, dock) reliably
      # does. Tuned vs the LD19's 7 Hz × ~455-bin sweep.
      min_points: 8
      visualize: true
      polygon_pub_topic: "polygon_stop"
      enabled: true
    PolygonSlow:
      type: "polygon"
      # Chassis + 15 cm — slow to 30% when obstacle is close
      points: "[[0.65, 0.35], [0.65, -0.35], [-0.25, -0.35], [-0.25, 0.35]]"
      action_type: "slowdown"
      slowdown_ratio: 0.3
      # 12 points: the dock structure sits near the polygon boundary
      # when charging, causing rapid slow/normal flapping at 10 Hz.
      # Higher min_points adds hysteresis against that edge noise.
      min_points: 12
      visualize: true
      polygon_pub_topic: "polygon_slow"
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      # Read the FILTERED scan (chassis self-returns blanked,
      # dock structure blanked while charging) so collision_monitor
      # never sees the robot's own chassis as an obstacle. The raw
      # /scan is still available for slam / debugging.
      topic: /scan_costmap
      # Disable the height filter (-1.0 / 5.0). The previous setting
      # (min_height: 0.20) was a no-op for a 2D LiDAR — every scan
      # point lands at exactly lidar_z in base frame, so the filter
      # is tout-ou-rien depending on whether lidar_z exceeds
      # min_height. With lidar_z=0.10 on this robot, min_height=0.20
      # rejected every point and collision_monitor saw nothing during
      # mowing. The polygon zones already do the spatial filtering;
      # the lidar plane itself is the relevant z, not a filter band.
      min_height: -1.0
      max_height: 5.0
      enabled: true

# ---------------------------------------------------------------------------
# Coverage server (opennav_coverage / Fields2Cover backend)
# Plans the F2C path on demand via /compute_coverage_path action when
# the BT's PlanCoverageArea node ticks. operation_width must match the
# real mower cut width (YardForce 500 = 0.20 m). headland_width is
# overridable per-request via the BT port headland_width_m. The
# RPATH on libopennav_coverage_core.so already points to
# /opt/fields2cover-121/lib so no LD_LIBRARY_PATH is required.
# ---------------------------------------------------------------------------
coverage_server:
  ros__parameters:
    use_sim_time: false
    default_headland_width: 0.20
    robot_width: 0.20
    # operation_width is INJECTED at launch from
    # mowgli_robot.yaml.tool_width via navigation.launch.py
    # (_inject_dock_pose_and_speeds). The value below is just the
    # node default for isolated runs / tests; production value comes
    # from the per-site config so the F2C swath spacing always
    # matches the actual blade cutting width.
    operation_width: 0.18
    # Differential-drive YardForce 500 rotates in place — set the turning
    # radius to a value smaller than the swath spacing so F2C never
    # generates a Dubin loop that exceeds the headland inset. Combined
    # with default_path_continuity_type=DISCONTINUOUS below, F2C emits
    # straight swath segments separated by sharp orientation changes,
    # which FTCController handles via PRE_ROTATE between segments. A
    # CONTINUOUS Dubin path here drives outside the polygon at every
    # swath end (turning radius > headland width).
    min_turning_radius: 0.05
    linear_curv_change: 200.0
    coordinates_in_cartesian_frame: true
    default_allow_overlap: false
    default_swath_angle_type: "BRUTE_FORCE"
    default_swath_type: "LENGTH"
    default_route_type: "BOUSTROPHEDON"
    default_path_type: "DUBIN"
    default_path_continuity_type: "DISCONTINUOUS"

# ---------------------------------------------------------------------------
# Lifecycle manager
# Note: Nav2's navigation_launch.py creates its own lifecycle_manager_navigation
# with the correct node list. This section provides parameters that get merged
# via RewrittenYaml.
# ---------------------------------------------------------------------------
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 10.0

# Nav2 parameters for Mowgli outdoor robot mower — GPS-only mode (no LiDAR).
#
# This is a variant of nav2_params.yaml for robots without a LiDAR sensor.
# Differences from nav2_params.yaml:
#   - Costmaps: no obstacle_layer (no /scan source)
#   - Collision monitor: scan source disabled (pass-through)
#   - PolygonSlow removed (no obstacle detection to trigger it)
#
# IMPORTANT: When updating nav2_params.yaml, check if changes apply here too.

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    # 1000 ms — see nav2_params.yaml for full rationale. Short version:
    # IsPathValid in our custom navigate_to_pose.xml times out against
    # planner_server's is_path_valid service on ARM (60 ms was too tight),
    # which aborts NavigateToPose and cascades into a DockRobot abort on
    # HOME, dropping the robot back to IDLE.
    default_server_timeout: 1000
    # Match the with-lidar config: 1s default is too tight, planner_server's
    # compute_path_to_pose action server isn't always up within 1s of
    # bt_navigator's Activate transition on ARM cold-boot, which fails the
    # whole lifecycle bringup ("Action server compute_path_to_pose not
    # available", error 9001) and leaves bt_navigator inactive — every
    # subsequent NavigateToPose goal gets "Action server is inactive.
    # Rejecting the goal", which the BT then converts into a 3-strike
    # SkipStrip cascade.
    wait_for_service_timeout: 10000
    # Custom Nav2 BT that adds GoalCheckerSelector (required when multiple
    # goal_checker_plugins are configured in controller_server).
    # Paths are injected by navigation.launch.py via RewrittenYaml — keep empty here.
    default_nav_to_pose_bt_xml: ""
    default_nav_through_poses_bt_xml: ""
    enable_stamped_cmd_vel: true

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

# ---------------------------------------------------------------------------
# Controller server
# ---------------------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: false
    # Match nav2_params.yaml. hardware_bridge_node subscribes to
    # TwistStamped on ~/cmd_vel; with enable_stamped_cmd_vel:false the
    # controller publishes plain Twist and no command reaches the
    # firmware — robot looks "deaf" with no error.
    enable_stamped_cmd_vel: true
    # 10 Hz to match nav2_params.yaml. ARM host was chronically missing
    # 20 Hz (10-25 Hz jittery); stable 10 Hz beats jittery 20 Hz for FTC
    # tracking.
    controller_frequency: 10.0
    # Match the LiDAR config's ARM TF jitter envelope.
    controller.transform_tolerance: 0.5
    # Without LiDAR, costmaps tick slower (no obstacle observations
    # driving updates) so default 1.0s timeout races with the 1-2 Hz
    # costmap update cycle and surfaces as "Costmap timed out waiting
    # for update" error 207.
    costmap_update_timeout: 5.0
    # Match nav2_params.yaml. These thresholds filter the controller's
    # PERCEIVED velocity (odom feedback) for its own "am I moving?"
    # state machine — they do NOT filter the cmd_vel output. Output
    # clamping is handled host-side by hardware_bridge on_cmd_vel
    # (sub-0.15 m/s vx → zero). Keeping all three at 0 means the
    # controller reads true odom velocity for goal-checking and
    # progress accounting; pretending the robot is stopped when it's
    # actually drifting at 5 cm/s would skew both.
    min_x_velocity_threshold: 0.0
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.0
    failure_tolerance: 1.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["stopped_goal_checker", "coverage_goal_checker"]
    controller_plugins: ["FollowPath", "FollowCoveragePath"]

    progress_checker:
      # PoseProgressChecker (not SimpleProgressChecker) so rotation
      # also counts as progress — headland pivots no longer trip
      # "no progress" recovery. See nav2_params.yaml.
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.15
      required_movement_angle: 0.5     # rad (~28°), gates corner pivots
      movement_time_allowance: 30.0

    stopped_goal_checker:
      plugin: "nav2_controller::StoppedGoalChecker"
      trans_stopped_velocity: 0.10
      xy_goal_tolerance: 0.30
      # 0.10 rad to match the lidar config — see nav2_params.yaml for
      # the "en biais" docking rationale.
      yaw_goal_tolerance: 0.10

    coverage_goal_checker:
      # PathProgressGoalChecker (mowgli plugin) — fires when the robot
      # has monotonically tracked >= progress_threshold of the path
      # poses AND is within xy/yaw tolerance of the goal pose. With
      # SimpleGoalChecker the F2C path's last pose can sit 25–50 cm
      # from where FTC's PID converges (Dubins connector geometry)
      # → FollowStrip never succeeds → BT loops. CLAUDE.md "Do NOT
      # use SimpleGoalChecker / StoppedGoalChecker for the
      # coverage_goal_checker slot" invariant.
      plugin: "mowgli_nav2_plugins/PathProgressGoalChecker"
      progress_threshold: 0.95
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 0.30
      plan_topic: "/controller_server/FollowCoveragePath/global_plan"

    # FollowPath (transit) — RotationShimController wrapping
    # RegulatedPurePursuitController, matching nav2_params.yaml. RPP's
    # carrot-based pure pursuit produces smooth, regulated transit
    # commands that hold heading well on return-to-dock, where FTC's
    # PRE_ROTATE state was issuing sub-deadband wz corrections the
    # firmware couldn't execute and the robot would arrive at the
    # staging pose with a stale yaw.
    #
    # use_collision_detection: false here — the local_costmap has no
    # obstacle_layer without LiDAR so RPP's collision sim would
    # always pass anyway, but switching it off avoids the every-tick
    # ray-cast cost. collision_monitor (pass-through in no-LiDAR
    # mode) keeps the safety contract on cmd_vel.
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # --- RotationShim params ---
      angular_dist_threshold: 0.785
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 0.75  # decisive pivot, clear of deadband — see nav2_params.yaml
      max_angular_accel: 2.5
      simulate_ahead_time: 1.0
      rotate_to_goal_heading: false        # let RPP handle final heading
      closed_loop: true                    # use wheel odom feedback for pivot completion

      # --- RegulatedPurePursuitController (primary) params ---
      transform_tolerance: 0.3
      desired_linear_vel: 0.30
      min_approach_linear_velocity: 0.16   # ≥ kMinLinVel=0.15 host clamp (hardware_bridge on_cmd_vel)
      approach_velocity_scaling_dist: 0.6
      use_velocity_scaled_lookahead_dist: true
      lookahead_time: 1.5
      min_lookahead_dist: 0.30
      max_lookahead_dist: 0.90
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.20
      use_cost_regulated_linear_velocity_scaling: false
      use_collision_detection: false       # no obstacle_layer without LiDAR
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      rotate_to_heading_angular_vel: 0.75
      max_angular_accel: 2.5
      allow_reversing: false
      max_robot_pose_search_dist: 10.0
      use_interpolation: true

    # Follow-the-Carrot controller for coverage mowing.
    FollowCoveragePath:
      plugin: "mowgli_nav2_plugins/FTCController"
      # Match nav2_params.yaml — see there for full rationale on every
      # value. check_obstacles=false here since there's no obstacle_layer
      # in the local_costmap to query.
      speed_fast: 0.20
      speed_fast_threshold: 0.5
      speed_fast_threshold_angle: 10.0
      speed_slow: 0.16    # ≥ kMinLinVel=0.15 host clamp (hardware_bridge on_cmd_vel)
      speed_angular: 45.0
      acceleration: 0.2
      # Match nav2_params.yaml — see there for the wheel-PI motor-model
      # detuning rationale (2026-05-19).
      kp_lon: 1.0
      ki_lon: 0.0
      kd_lon: 0.0
      kp_lat: 1.2
      ki_lat: 0.0
      kd_lat: 1.5
      kp_ang: 1.5
      ki_ang: 0.0
      kd_ang: 0.0
      max_cmd_vel_speed: 0.30
      max_cmd_vel_ang: 0.8
      max_goal_distance_error: 0.50    # match nav2_params.yaml — Dubins + motor PI oscillation budget
      max_goal_angle_error: 30.0
      goal_timeout: 10.0
      max_follow_distance: 2.0
      forward_only: false
      check_obstacles: false

# ---------------------------------------------------------------------------
# Planner server
# ---------------------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: false
    # See controller_server for rationale — costmap_update_timeout default
    # (1.0s) races with the slow costmap update rate when no LiDAR is
    # driving obstacle layer ticks, causing repeated planning failures.
    costmap_update_timeout: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.50
      downsample_costmap: false
      downsampling_factor: 2     # match nav2_params.yaml
      allow_unknown: false
      max_iterations: 100000     # match nav2_params.yaml (1M was an old experiment)
      max_on_approach_iterations: 1000
      max_planning_time: 3.5
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

# ---------------------------------------------------------------------------
# Smoother server
# ---------------------------------------------------------------------------
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ---------------------------------------------------------------------------
# Recoveries / Behavior server
# ---------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: false
    # Nav2 Kilted renamed costmap_topic/footprint_topic →
    # local_costmap_topic/local_footprint_topic. Old names are silently
    # ignored, behaviors fall back to defaults that don't match our
    # local_costmap and BackUp/Spin never see the footprint.
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_footprint
    controller.transform_tolerance: 0.5
    # 0.5s sim-ahead — 2.0s refused every undock by projecting BackUp
    # through phantom LETHAL cells 30-50 cm behind. See nav2_params.yaml.
    simulate_ahead_time: 0.5
    enable_stamped_cmd_vel: true
    # Match nav2_params.yaml. 3.0 was a holdover from before the host
    # deadband clamp was introduced.
    max_rotational_vel: 2.5
    # 0.85 rad/s ≈ wheel vel 0.14 m/s per wheel (PWM 42 > deadband).
    # 0.15 floor let Spin behavior dither at sub-deadband ω.
    min_rotational_vel: 0.85
    rotational_acc_lim: 5.0

# ---------------------------------------------------------------------------
# Waypoint follower
# ---------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

# velocity_smoother removed 2026-04-26 — see nav2_params.yaml.

# ---------------------------------------------------------------------------
# Global costmap — no obstacle layer (no LiDAR)
# ---------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      # 1 Hz to match the lidar config — see nav2_params.yaml for the
      # idle-CPU rationale. With no obstacle_layer here the per-tick work
      # is much lighter than the lidar variant, but staying in lockstep
      # avoids surprises when toggling between hardware presets.
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      # 0.5s — 5.0s allowed up to 229° rotation smear at max ω. ARM
      # scheduler jitter sits ~300 ms; 0.5 still absorbs it.
      transform_tolerance: 0.5
      footprint: "[[0.50, 0.20], [0.50, -0.20], [-0.10, -0.20], [-0.10, 0.20]]"
      # 0.08 m to match the lidar config (see nav2_params.yaml). 5+ cells
      # across the chassis is still ample for SmacPlanner2D.
      resolution: 0.08
      always_send_full_costmap: false   # match nav2_params.yaml
      track_unknown_space: false
      rolling_window: true
      width: 20     # match nav2_params.yaml — 200×200m was an old experiment
      height: 20
      # No obstacle_layer — LiDAR is not available.
      # static_layer subscribes to an empty latched OccupancyGrid published
      # by empty_static_map_pub.py — without an always-current layer like
      # this, the global_costmap's current_ flag never settles to true under
      # Nav2 Kilted's KeepoutFilter and the planner aborts every request
      # with "Costmap timed out waiting for update".
      # keepout_filter makes the mowing polygon boundary visible to the
      # planner so transit paths never exit the area. Local costmap stays
      # filter-free so Nav2 recoveries still function near the dock.
      plugins: ["static_layer", "keepout_filter", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: "/no_lidar_static_map"
        subscribe_to_updates: false
        transform_tolerance: 0.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # cost_scaling_factor 10 + inflation_radius 0.20: 0.40 m inflation
        # made footprint corners land inside the inflated zone whenever
        # the robot was within ~0.44 m of the polygon edge → "Start
        # occupied" planner failures. See nav2_params.yaml.
        cost_scaling_factor: 10.0
        inflation_radius: 0.20

      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/costmap_filter_info"

# ---------------------------------------------------------------------------
# Local costmap — no obstacle layer (no LiDAR)
# ---------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      # 10 Hz to match the lidar config so update_frequency stays above
      # controller_frequency (10 Hz) and the costmap is always fresh when
      # the controller ticks.
      update_frequency: 10.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      transform_tolerance: 0.5
      # No obstacle source — without periodic full publishes the costmap
      # rarely updates and isCurrent() never flips true.
      always_send_full_costmap: true
      footprint: "[[0.50, 0.20], [0.50, -0.20], [-0.10, -0.20], [-0.10, 0.20]]"
      resolution: 0.05
      rolling_window: true
      width: 12    # match nav2_params.yaml
      height: 12
      # No obstacle_layer — LiDAR is not available. The static_layer
      # subscribes to the same latched empty OccupancyGrid as the global
      # costmap; without a current source layer the costmap's current_
      # flag never goes true and controller_server aborts every
      # follow_path with "Costmap timed out waiting for update" (107).
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: "/no_lidar_static_map"
        subscribe_to_updates: false
        transform_tolerance: 0.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.30   # match nav2_params.yaml local_costmap

# ---------------------------------------------------------------------------
# Map server / AMCL (unused — map→odom is a static identity, no SLAM backend;
# kept for completeness / Nav2 lifecycle compatibility)
# ---------------------------------------------------------------------------
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# ---------------------------------------------------------------------------
# Docking server (opennav_docking)
# ---------------------------------------------------------------------------
docking_server:
  ros__parameters:
    use_sim_time: false
    # See nav2_params.yaml — 0.1 s default tripped extrapolation errors
    # against the 50 Hz /tf publish rate, killed DockRobot in seconds.
    # Nested under `controller`; bare key is silently dropped.
    controller.transform_tolerance: 0.5
    # hardware_bridge_node subscribes to TwistStamped — without this
    # the docking controller publishes plain Twist and the dock
    # approach never reaches the firmware. Symptom: dock action
    # accepted, robot doesn't move, "Timed out waiting for charge".
    enable_stamped_cmd_vel: true
    # 20 Hz to match nav2_params.yaml. Faster polling of isDocked()/
    # isCharging() so the robot stops within ~50 ms of the charging
    # signal; comfortable on ARM.
    controller_frequency: 20.0
    initial_perception_timeout: 5.0
    # 10 s accommodates the ~2-3 s firmware ADC debounce on
    # STATUS_BIT_CHARGING before /battery_state reflects charging.
    wait_charge_timeout: 10.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: base_footprint
    fixed_frame: odom
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    # Graceful-controller velocity envelope. v_linear_min was 0.05 here
    # which sits under the 0.15 m/s host clamp (hardware_bridge
    # on_cmd_vel) — the controller would command 0.05–0.13 m/s during
    # the final approach and the clamp would zero every sample,
    # leaving the robot parked at the staging pose. 0.13 matches
    # nav2_params.yaml and stays above the clamp's strict-less-than
    # boundary.
    controller.use_collision_detection: false
    # Match nav2_params.yaml — upstream defaults except v_linear_min
    # (stays at 0.16 for the host clamp at 0.15).
    controller.v_linear_min: 0.16
    controller.v_linear_max: 0.25
    controller.v_angular_max: 0.75
    controller.slowdown_radius: 0.25
    controller.k_phi: 3.0
    controller.k_delta: 2.0
    dock_plugins: ["simple_charging_dock"]
    docks: ["home_dock"]
    home_dock:
      type: "simple_charging_dock"
      frame: map
      pose: [0.0, 0.0, 0.0]  # Overridden at launch from dock_pose_x/y/yaw params
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      # Forward-direction docking — match nav2_params.yaml.
      dock_direction: "forward"
      # rotate_to_dock=true requires dock_direction=backward in the
      # upstream opennav_docking plugin; combining it with the YardForce
      # nose-first forward approach throws at CONFIGURE and aborts the
      # entire Nav2 bringup. Leave disabled — see nav2_params.yaml.
      rotate_to_dock: false
      # 0.3 A to match the lidar config — see nav2_params.yaml for the
      # "barely seated" rationale.
      charging_threshold: 0.3
      docking_threshold: 0.05
      # 1.5 m straight-line approach — see nav2_params.yaml for rationale.
      staging_x_offset: -1.5
      use_external_detection_pose: false
      use_battery_status: true
      battery_topic: "/battery_state"
      use_stall_detection: false
      filter_coef: 0.1

# ---------------------------------------------------------------------------
# Collision monitor — no LiDAR (pass-through mode)
# Scan source is declared but disabled. collision_monitor requires at least
# one observation_source to initialize, but it won't trigger stops since the
# source is disabled. PolygonSlow is removed (no sensor data to trigger it).
# ---------------------------------------------------------------------------
collision_monitor:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    base_frame_id: base_footprint
    odom_frame_id: odom
    # 2026-04-26: smoother removed; collision_monitor reads directly from
    # the controller output and writes the post-safety topic.
    cmd_vel_in_topic: cmd_vel_nav
    cmd_vel_out_topic: cmd_vel_monitored
    state_topic: collision_monitor_state
    controller.transform_tolerance: 0.5
    # 5s — ARM TF/scan jitter can briefly stall sources; 1s caused
    # spurious stops on the lidar config and the same applies here.
    source_timeout: 5.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["PolygonStop", "FootprintApproach"]
    PolygonStop:
      type: "polygon"
      points: "[[0.50, 0.20], [0.50, -0.20], [-0.10, -0.20], [-0.10, 0.20]]"
      action_type: "stop"
      min_points: 2
      visualize: false
      polygon_pub_topic: "polygon_stop"
      enabled: false
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 2.0
      simulation_time_step: 0.05
      min_points: 1
      visualize: false
      enabled: false
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: /scan
      enabled: false

# ---------------------------------------------------------------------------
# Coverage server (mowgli_coverage / Fields2Cover v2 backend) — same as
# nav2_params.yaml. Kept in this no-lidar variant so a no-lidar boot still
# brings up coverage_server cleanly. operation_width is INJECTED at launch
# from mowgli_robot.yaml.tool_width via navigation.launch.py; the value
# below is just the node default for isolated runs / tests.
# ---------------------------------------------------------------------------
coverage_server:
  ros__parameters:
    use_sim_time: false
    default_headland_width: 0.20
    robot_width: 0.20
    operation_width: 0.18
    min_turning_radius: 0.05
    linear_curv_change: 200.0
    coordinates_in_cartesian_frame: true
    default_allow_overlap: false
    default_swath_angle_type: "BRUTE_FORCE"
    default_swath_type: "LENGTH"
    default_route_type: "BOUSTROPHEDON"
    default_path_type: "DUBIN"
    default_path_continuity_type: "DISCONTINUOUS"

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 10.0

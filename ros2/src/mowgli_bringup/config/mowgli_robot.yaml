# =============================================================================
# mowgli_robot.yaml — Centralized robot-specific configuration
#
# All physical, operational, and safety parameters for the Mowgli robot mower.
# Inspired by OpenMower's mower_config.sh but in ROS2 YAML format.
#
# This file is the single source of truth for robot-specific values.
# Other config files (nav2_params, coverage_planner, etc.) should reference
# or be overridden by these values at launch time.
# =============================================================================

mowgli:
  ros__parameters:

    # -----------------------------------------------------------------
    # Hardware / Physical
    # -----------------------------------------------------------------
    mower_model: "YardForce500"

    # Chassis dimensions (metres) — physically measured on the actual
    # YardForce 500. Earlier the runtime YAML had 0.54 m which silently
    # diverged from this template; the 0.60 m here is the correct value
    # and was restored on 2026-04-26.
    chassis_length: 0.60
    chassis_width: 0.40
    chassis_height: 0.19
    chassis_mass_kg: 8.76

    # Drive wheels (rear) — physical wheel diameter 186 mm → radius 0.093 m
    wheel_radius: 0.093
    wheel_width: 0.04
    wheel_track: 0.325         # centre-to-centre (from OpenMower).
                               # Read by hardware_bridge_node and URDF.
                               # MUST match firmware physical assumption.
    wheel_x_offset: 0.0       # drive wheels at base_link (wheel axis centre)
    chassis_center_x: 0.18    # chassis geometric centre forward of wheel axis (m)
                               # with chassis_length 0.60 → rear bumper -0.12,
                               # front bumper +0.48
    # ticks_per_meter is consumed by hardware_bridge_node to convert raw
    # encoder tick deltas (from the STM32 firmware odom packet) into
    # metres. MUST match the firmware constant TICKS_PER_M in
    # firmware/stm32/ros_usbnode/include/board.h — the firmware sends
    # raw ticks, the bridge does the scaling.
    ticks_per_meter: 300.0
    # Behavior tree tuning (consumed by behavior_tree_node)
    tick_rate: 10.0
    bt_debug_logging: false
    # IMU calibration (consumed by hardware_bridge_node — auto-triggered on dock)
    imu_cal_samples: 200
    imu_cal_persist_path: /ros2_ws/maps/imu_calibration.txt
    imu_cal_auto_rest_sec: 15.0
    imu_cal_periodic_recal_sec: 60.0
    # Magnetometer fusion (consumed by cog_to_imu_node + mag_yaw_publisher_node)
    enable_mag_cal: false
    mag_calibration_path: /ros2_ws/maps/mag_calibration.yaml
    declination_deg: 1.5
    min_horizontal_uT: 5.0
    mag_yaw_variance: 0.0027
    # Dock seeding (consumed by dock_yaw_to_set_pose)
    dock_pose_yaw_sigma_rad: 0.035
    # (Informational: circumference 2π·0.093 = 0.584 m, so
    #  300 ticks/m × 0.584 m/rev ≈ 175 ticks per revolution. ticks_per_meter
    #  is declared once above; this comment stays as the wheel-size
    #  cross-check.)

    # Front casters
    caster_radius: 0.03
    caster_track: 0.36

    # Mowing blade
    blade_radius: 0.09
    tool_width: 0.18           # effective cut width (2 × blade_radius)

    # -----------------------------------------------------------------
    # Lidar mount position / orientation (relative to base_link)
    # Synced 2026-04-26 to runtime config: this robot's LD19 sits near
    # base_link with a tiny lateral offset and is rotated ~π (mounted
    # back-to-front so the cable side faces aft). Values per real
    # mechanical mount, not OpenMower defaults.
    # -----------------------------------------------------------------
    lidar_x: 0.0               # forward offset from wheel axis (m)
    lidar_y: 0.024             # lateral offset (m)
    lidar_z: 0.22              # vertical offset (m)
    lidar_yaw: 3.1408          # heading offset (rad) — ~π for 180°-rotated mount

    # IMU mounting (relative to base_link = wheel axis centre).
    # imu_pitch / imu_roll: bench-zero default. The hardware_bridge
    # IMU calibration phase logs the implied mounting offset on each
    # docking event; promote any sustained |offset| > 1° here so that
    # gravity removal stops leaking into yaw integration. See
    # CLAUDE.md invariant 6.
    imu_x: 0.18                # forward offset from wheel axis (m)
    imu_y: 0.0                 # lateral offset (m)
    imu_z: 0.095               # vertical offset (m) — base_height / 2
    imu_roll: 0.0              # mounting roll  (rad)
    imu_pitch: 0.0             # mounting pitch (rad)
    imu_yaw: 0.0               # heading offset (rad) — auto-calibrated via GUI button

    # GPS antenna mounting (relative to base_link = wheel axis centre)
    # From OpenMower: OM_ANTENNA_OFFSET_X=0.3 (antenna on front top cover)
    gps_x: 0.3                 # forward offset from wheel axis (m)
    gps_y: 0.0                 # lateral offset (m)
    gps_z: 0.20                # vertical offset (m) — top of chassis + antenna

    # -----------------------------------------------------------------
    # Localization backend
    # -----------------------------------------------------------------
    # use_fusion_graph (default false): replace ekf_map_node with the
    # GTSAM factor-graph localizer (fusion_graph package). ekf_odom
    # keeps publishing odom→base_footprint either way. Flip to true on
    # robots equipped with LiDAR + RTK GPS where you want
    # scan-matching-driven map-frame consistency through RTK-Float
    # gaps.
    use_fusion_graph: true

    # lidar_enabled (default true): if false, navigation.launch.py boots
    # the no-lidar config (different costmap setup, FollowPath without
    # obstacle layer) — useful for hardware bring-up before the LiDAR
    # is mounted. The launch CLI arg is still `use_lidar:=true|false`
    # for command-line overrides; the YAML key is the per-site default.
    lidar_enabled: true

    # use_magnetometer (default false): subscribe to /imu/mag_yaw and
    # let it influence the map-frame yaw. The chassis motor field
    # induces a heading-dependent bias that no static cal can remove,
    # so this is OFF by default. Only flip to true on a motor-isolated
    # mag setup.
    use_magnetometer: false

    # use_scan_matching (default false; only effective when
    # use_fusion_graph is true): per-tick ICP between the latest /scan
    # and the previous graph-node scan. Adds a BetweenFactor with
    # rmse-scaled covariance — bounded drift between consecutive
    # nodes even without GPS. Required for "robot keeps mowing
    # through GPS dropouts" scenarios.
    use_scan_matching: true

    # use_loop_closure (default false; only effective when
    # use_scan_matching is also true): on every new node, search
    # earlier graph nodes within ~5 m / >30 s ago for an ICP match
    # against the current scan. Accepted matches add a BetweenFactor
    # that snaps the trajectory back to consistency with previously-
    # seen places. Resets accumulated drift across multi-minute GPS-
    # less stretches at the cost of one ICP per candidate per tick.
    use_loop_closure: true

    # -----------------------------------------------------------------
    # GPS / Positioning
    # -----------------------------------------------------------------
    gps_protocol: "UBX"
    datum_lat: 0.0             # map origin latitude  (set per-site)
    datum_lon: 0.0             # map origin longitude (set per-site)
    # (Removed 2026-05-10: gps_wait_after_undock_sec / gps_timeout_sec
    #  had no readers anywhere on the runtime path. The BT's
    #  CalibrateHeadingFromUndock and the GPS health check use their own
    #  hardcoded values. Re-add here if/when those nodes are
    #  parameterised.)

    # NTRIP (RTK correction stream)
    ntrip_enabled: false
    ntrip_host: ""
    ntrip_port: 2101
    ntrip_user: ""
    ntrip_password: ""
    ntrip_mountpoint: ""

    # -----------------------------------------------------------------
    # Battery
    # -----------------------------------------------------------------
    battery_full_voltage: 28.5     # consider fully charged above this
    battery_empty_voltage: 24.0    # dock if below for sustained period
    battery_critical_voltage: 23.0 # immediate dock
    battery_full_percent: 95.0     # resume mowing above this %
    battery_low_percent: 20.0      # start docking
    battery_critical_percent: 10.0 # emergency dock

    # -----------------------------------------------------------------
    # Mowing
    # -----------------------------------------------------------------
    mowing_enabled: true           # enable blade motor during mowing
    mowing_speed: 0.5              # m/s during coverage paths
    transit_speed: 0.5             # m/s during point-to-point navigation
    outline_passes: 1              # perimeter passes before fill
    outline_overlap: 0.0           # overlap between outline and fill (m)
    outline_offset: 0.05           # inward offset from boundary (m)
    mow_angle_offset_deg: -1.0    # -1 = auto-detect optimal angle
    mow_angle_increment_deg: 0.0  # rotate pattern each full pass
    # F2C v2 coverage tuning (mowgli_coverage server).
    #   headland_width — outer strip mowed first as N concentric rings
    #     before the inner-field swaths. F2C ConstHL inset =
    #     headland_width; generateHeadlandSwaths emits
    #     ceil(headland_width / tool_width) perimeter passes. Set to
    #     2-3x tool_width for one full perimeter lap.
    #   min_turning_radius — F2C Robot::setMinTurningRadius. Bounds the
    #     Dubins arc radius between swaths and between sub-cells. Diff-
    #     drive mowers can pivot in place — keep this small (~ 0.05 m)
    #     so the arc connectors collapse to straight + PRE_ROTATE,
    #     which FTC handles natively. An Ackermann variant would set
    #     this to its real turn radius.
    # (path_spacing was retired with the tool_width unification — F2C
    #  swath spacing is now Robot::setCovWidth = tool_width directly.)
    headland_width: 0.35
    min_turning_radius: 0.05

    # -----------------------------------------------------------------
    # Docking
    # -----------------------------------------------------------------
    dock_pose_x: 0.0              # dock position in map frame (set per-site)
    dock_pose_y: 0.0
    dock_pose_yaw: 4.17            # measured with phone compass (239°)
    undock_distance: 1.5           # reverse distance when undocking (m)
    undock_speed: 0.15             # reverse speed (m/s)
    dock_approach_distance: 1.0    # distance to staging pose in front of dock
    dock_max_retries: 3
    dock_use_charger_detection: true
    # Dock body — physical structure the robot cannot drive through. Cells
    # inside this rectangle (centred on dock_pose, axes aligned with
    # dock_pose_yaw) are marked OBSTACLE_PERMANENT: F2C strips stop at
    # the body edge and Smac sees them as lethal. Defaults match the
    # YardForce500 dock; measure your dock and override per site.
    dock_body_length_m: 0.80       # extent along dock -X (depth into dock)
    dock_body_width_m: 0.55        # extent along dock ±Y (lateral)

    # -----------------------------------------------------------------
    # Rain
    # -----------------------------------------------------------------
    # Modes: 0=ignore, 1=dock, 2=dock_until_dry, 3=pause_auto
    rain_mode: 2
    # (rain_delay_minutes removed 2026-05-10 — no reader in BT or
    #  hardware_bridge. Re-add when behavior_tree_node consumes it.)
    rain_debounce_sec: 10.0        # rain must persist this long to trigger

    # -----------------------------------------------------------------
    # Safety
    # -----------------------------------------------------------------
    motor_temp_high_c: 80.0        # stop blade if motor exceeds
    motor_temp_low_c: 40.0         # resume blade below this
    # Lift/tilt emergency is handled by firmware (STM32), not ROS2
    max_obstacle_avoidance_distance: 2.0  # how far to deviate from path

    # -----------------------------------------------------------------
    # Navigation tolerances (garden terrain)
    # -----------------------------------------------------------------
    xy_goal_tolerance: 0.10        # metres — acceptable goal position error (transit)
    yaw_goal_tolerance: 0.20       # radians — acceptable heading error (~11°, transit)
    # coverage_xy_tolerance MUST stay below tool_width (0.18 m). The
    # SimpleGoalChecker (used by FollowCoveragePath) fires when the robot
    # is within tolerance of the strip's END pose. Coverage strips are
    # short (<3 m, often <0.5 m), so any value > strip length lets the
    # controller declare 'reached' on tick 1 — the BT loops
    # GetNextSegment forever without moving the robot. Field-broken
    # 2026-05-08 with the old 0.5 m default.
    coverage_xy_tolerance: 0.05    # metres — tight to force path tracing
    progress_timeout_sec: 60.0     # seconds without progress before recovery

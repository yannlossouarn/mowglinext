# =============================================================================
# mowgli_robot.yaml — Centralized robot-specific configuration
#
# All physical, operational, and safety parameters for the Mowgli robot mower.
# Inspired by OpenMower's mower_config.sh but in ROS2 YAML format.
#
# This file is the single source of truth for robot-specific values.
# Other config files (nav2_params, coverage_planner, etc.) should reference
# or be overridden by these values at launch time.
# =============================================================================

mowgli:
  ros__parameters:

    # -----------------------------------------------------------------
    # Hardware / Physical
    # -----------------------------------------------------------------
    mower_model: "YardForce500"

    # Chassis dimensions (metres) — physically measured on the actual
    # YardForce 500: 573 × 424 × 248 mm. These feed the URDF and the
    # navigation.launch.py costmap footprint builder; if absent the builder
    # falls back to 0.54 × 0.40 and Nav2's footprint diverges from reality.
    chassis_length: 0.573
    chassis_width: 0.424
    chassis_height: 0.248
    chassis_mass_kg: 8.76
    # Drive-wheel axis sits ~0.10 m in front of the rear face, so the geometric
    # centre is 0.573/2 − 0.10 ≈ 0.187 m forward of the wheel axis (base_link).
    chassis_center_x: 0.187   # → rear face −0.10 m, front face +0.473 m

    # Drive wheels (rear)
    wheel_radius: 0.1          # 0.2 m diameter drive wheels (measured). Was
                               # 0.04475 (an 8.9 cm wheel) — wrong. URDF-only on
                               # the real robot (odometry uses ticks_per_meter
                               # directly), but it sets base_link height + sensor
                               # z, so keep it physical.
    wheel_width: 0.04
    wheel_track: 0.325         # centre-to-centre (from OpenMower).
                               # Read by hardware_bridge_node and URDF.
                               # MUST match firmware physical assumption.
    wheel_x_offset: 0.0       # drive wheels at base_link (wheel axis centre)
    # ticks_per_meter is consumed by hardware_bridge_node to convert raw
    # encoder tick deltas (from the STM32 firmware odom packet) into
    # metres. MUST match the firmware constant TICKS_PER_M in
    # firmware/stm32/ros_usbnode/include/board.h — the firmware sends
    # raw ticks, the bridge does the scaling.
    ticks_per_meter: 300.0
    # Behavior tree tuning (consumed by behavior_tree_node)
    tick_rate: 10.0
    bt_debug_logging: false
    # IMU calibration (consumed by hardware_bridge_node — auto-triggered on dock)
    imu_cal_samples: 200
    imu_cal_persist_path: /ros2_ws/maps/imu_calibration.txt
    imu_cal_auto_rest_sec: 15.0
    imu_cal_periodic_recal_sec: 600.0
    # Magnetometer fusion (consumed by cog_to_imu_node + mag_yaw_publisher_node)
    enable_mag_cal: false
    mag_calibration_path: /ros2_ws/maps/mag_calibration.yaml
    declination_deg: 1.5
    min_horizontal_uT: 5.0
    mag_yaw_variance: 0.0027
    # Dock seeding (consumed by dock_yaw_to_set_pose)
    dock_pose_yaw_sigma_rad: 0.035
    # Informational only — circumference 2π·0.1 = 0.628 m, so
    # 300 ticks/m × 0.628 m/rev ≈ 188 ticks per revolution. Kept as a
    # cross-check for future wheel-size changes. NOTE: ticks_per_meter=300
    # is empirically ~correct (wheel-integrated distance ≈ RTK distance on a
    # 2026-06-08 transit); a dedicated straight-line calibration drive will
    # refine it. It is NOT 1600 (that is v2's firmware tick convention; this
    # firmware reports a different raw count).
    ticks_per_revolution: 188

    # Front casters
    caster_radius: 0.03
    caster_track: 0.36

    # Mowing blade
    blade_radius: 0.09
    tool_width: 0.18           # effective cut width (2 × blade_radius)

    # -----------------------------------------------------------------
    # Lidar mount position / orientation (relative to base_link)
    # Synced 2026-04-26 to runtime config: this robot's LD19 sits near
    # base_link with a tiny lateral offset and is rotated ~π (mounted
    # back-to-front so the cable side faces aft). Values per real
    # mechanical mount, not OpenMower defaults.
    # -----------------------------------------------------------------
    lidar_x: 0.0               # forward offset from wheel axis (m)
    lidar_y: 0.024             # lateral offset (m)
    lidar_z: 0.22              # vertical offset (m)
    lidar_yaw: 3.1408          # heading offset (rad) — ~π for 180°-rotated mount

    # IMU mounting (relative to base_link = wheel axis centre).
    # Measured: IMU sits over the rotation centre (mid drive-wheel axle),
    # ~0.2 m above ground. base_link is at the axle (0.1 m above ground for
    # 0.2 m wheels), so vertical offset = 0.2 − 0.1 = 0.1 m.
    imu_x: 0.0                 # at the rotation centre / wheel axis (m)
    imu_y: 0.0                 # lateral offset (m)
    imu_z: 0.1                 # 0.2 m above ground − 0.1 m axle height
    imu_yaw: 0.0               # heading offset (rad) — if IMU is rotated

    # GPS antenna mounting (relative to base_link = wheel axis centre)
    # Measured on this robot: antenna ~0.32 m forward of the wheel axis.
    gps_x: 0.32                # forward offset from wheel axis (m)
    gps_y: 0.0                 # lateral offset (m)
    gps_z: 0.20                # vertical offset (m) — top of chassis + antenna

    # -----------------------------------------------------------------
    # Localization backend
    # -----------------------------------------------------------------
    # Map-frame localization is provided by fusion_graph_node (GTSAM
    # iSAM2 factor graph). It runs WITHOUT LiDAR when
    # use_scan_matching=false AND use_loop_closure=false — the graph
    # is just a Pose2 backbone with wheel between-factors, gyro
    # between-factors (or preintegrated factors when use_imu_preint=
    # true), and GNSS lever-arm + COG / mag unaries. Equivalent
    # functionality to the legacy ekf_map_node, with the option to
    # enable scan-matching + loop closure on LiDAR-equipped robots.
    use_fusion_graph: true

    # use_magnetometer (default false): subscribe to /imu/mag_yaw and
    # let it influence the map-frame yaw. The chassis motor field
    # induces a heading-dependent bias that no static cal can remove,
    # so this is OFF by default. Only flip to true on a motor-isolated
    # mag setup.
    use_magnetometer: false

    # use_scan_matching: per-tick ICP between the latest /scan and the
    # previous graph-node scan. Adds a BetweenFactor with rmse-scaled
    # covariance — bounded drift between consecutive nodes even when
    # GPS drops to RTK-Float. Required for "robot keeps mowing through
    # multi-minute GPS dropouts" scenarios. No-op when the LiDAR
    # driver is off (use_lidar=false): no /scan publisher, no
    # subscription, no factors.
    use_scan_matching: true

    # use_loop_closure: on every new node, search earlier graph nodes
    # within ~5 m / >30 s ago for an ICP match against the current
    # scan. Accepted matches add a BetweenFactor that snaps the
    # trajectory back to consistency with previously-seen places.
    # Resets accumulated drift across multi-minute GPS-less stretches
    # and at session start when re-entering a previously-mapped area.
    # Cost: one ICP per candidate per tick (~5 ms each, capped to
    # lc_max_candidates=3). No-op when use_scan_matching is also
    # false or when use_lidar=false (the launch file force-OFFs it
    # on first boot too — see navigation.launch.py).
    use_loop_closure: true

    # -----------------------------------------------------------------
    # GPS / Positioning
    # -----------------------------------------------------------------
    gps_protocol: "UBX"
    datum_lat: 0.0             # map origin latitude  (set per-site)
    datum_lon: 0.0             # map origin longitude (set per-site)
    gps_wait_after_undock_sec: 10.0   # wait for RTK fix after undocking
    gps_timeout_sec: 5.0              # pause mowing if no GPS for this long

    # NTRIP (RTK correction stream)
    ntrip_enabled: false
    ntrip_host: ""
    ntrip_port: 2101
    ntrip_user: ""
    ntrip_password: ""
    ntrip_mountpoint: ""

    # -----------------------------------------------------------------
    # Battery
    # -----------------------------------------------------------------
    battery_full_voltage: 28.5     # consider fully charged above this
    battery_empty_voltage: 24.0    # dock if below for sustained period
    battery_critical_voltage: 23.0 # immediate dock
    battery_full_percent: 95.0     # resume mowing above this %
    battery_low_percent: 20.0      # start docking
    battery_critical_percent: 10.0 # emergency dock

    # -----------------------------------------------------------------
    # Mowing
    # -----------------------------------------------------------------
    mowing_enabled: true           # enable blade motor during mowing
    mowing_speed: 0.2              # m/s during coverage paths (field-validated comfortable cut speed)
    transit_speed: 0.25            # m/s during point-to-point navigation (→ FollowPath FTC speed_fast + max_cmd_vel_speed)
    outline_passes: 1              # perimeter passes before fill
    outline_overlap: 0.0           # overlap between outline and fill (m)
    outline_offset: 0.05           # inward offset from boundary (m)
    mow_angle_offset_deg: -1.0    # -1 = auto-detect optimal angle
    mow_angle_increment_deg: 0.0  # rotate pattern each full pass
    headland_width: 0.18           # headland = 1 × tool_width
    # num_headland_passes: 0 = auto (= ceil(headland_width / tool_width)).
    # >0 forces exactly that many concentric perimeter rings, e.g. 1 for a
    # single perimeter pass, 2 for double, regardless of headland_width.
    num_headland_passes: 0
    # chassis_safety_inset: planning-time pull-back of the polygon edge
    # before F2C generates swaths/headlands. Commented out so the
    # navigation launch defaults it to chassis_width / 2 (= 0.20 m here),
    # which keeps the chassis edge inside the operator polygon even under
    # perfect FTC tracking. Override with an explicit metres value here
    # to bias more (hard fences) or less (open lawn).
    # chassis_safety_inset: 0.20
    path_spacing: 0.18             # = tool_width for full coverage
    min_turning_radius: 0.05       # skid-steer pivots in place; large values force wide F2C U-turns

    # -----------------------------------------------------------------
    # Docking
    # -----------------------------------------------------------------
    dock_pose_x: 0.0              # dock position in map frame (set per-site)
    dock_pose_y: 0.0
    # dock_pose_yaw MUST be a map-frame ENU yaw (rad) — opennav_docking
    # consumes it directly as the dock heading. Set it via the GUI
    # "Set Docking Point" button (robot seated on dock, charging,
    # RTK-Fixed, yaw converged) or the undock GPS-trajectory calibration;
    # both write the correct ENU value. A correctly-seated robot's
    # /odometry/filtered_map yaw equals this. NOTE: 4.17 below is a stale
    # hand-entered phone-compass seed (239°) — NOT a valid ENU yaw;
    # recalibrate per-site before relying on docking.
    dock_pose_yaw: 4.17
    undock_distance: 1.0           # reverse distance when undocking (m); must be > 0.5 m for CalibrateHeadingFromUndock
    undock_speed: 0.16             # reverse speed (m/s) — above kMinLinVel=0.15 host clamp
    # Distance (m) to the staging pose behind the dock — the final
    # straight-in approach runway. Injected as opennav_docking
    # simple_charging_dock.staging_x_offset = -dock_approach_distance
    # (navigation.launch.py). 1.5 m field-validated 2026-06 as a clean,
    # calm approach; longer runways (2.5) felt needlessly fast and bought
    # nothing once the dock pose is correctly pinned.
    dock_approach_distance: 1.5
    # Overshoot (m) applied to dock_pose in the body forward direction
    # when configuring opennav_docking's home_dock target. The robot
    # then aims at (dock_pose + overshoot) instead of dock_pose itself;
    # combined with docking_threshold (5 cm before the target), it
    # physically pushes past the calibrated pose so the charging
    # contacts seat firmly even when fusion's pose has 1-3 cm of
    # residual RTK / lever-arm noise. 5 cm matches docking_threshold
    # so a perfect-fusion robot stops exactly at the calibrated pose.
    dock_approach_overshoot: 0.05
    dock_max_retries: 3
    dock_use_charger_detection: true
    # Charging-current threshold (A) at which SimpleChargingDock considers
    # the cradle reached. 0.3 = solid contact past the spring detent on
    # the YardForce charger; lower stops short, higher over-presses.
    dock_charging_threshold: 0.3

    # -----------------------------------------------------------------
    # Rain
    # -----------------------------------------------------------------
    # Modes: 0=ignore, 1=dock, 2=dock_until_dry, 3=pause_auto
    rain_mode: 2
    rain_delay_minutes: 30.0       # wait after rain stops before resuming
    rain_debounce_sec: 10.0        # rain must persist this long to trigger

    # -----------------------------------------------------------------
    # Safety
    # -----------------------------------------------------------------
    motor_temp_high_c: 80.0        # stop blade if motor exceeds
    motor_temp_low_c: 40.0         # resume blade below this
    # Lift/tilt emergency is handled by firmware (STM32), not ROS2
    max_obstacle_avoidance_distance: 2.0  # how far to deviate from path

    # -----------------------------------------------------------------
    # Navigation tolerances (garden terrain)
    # -----------------------------------------------------------------
    # 0.30 m / 0.10 rad (was 0.75 / 1.0). The previous values let FTC
    # report SUCCESS with the chassis 25-40° off the goal yaw, which
    # made opennav_docking attack the cradle "en biais" (sideways). 0.10
    # rad (≈5.7°) forces a final in-place pivot before the dock approach.
    xy_goal_tolerance: 0.20        # metres — acceptable goal position error
    yaw_goal_tolerance: 0.25       # radians (~14°) — loose enough the coarse
                                   # robot settles without POST_ROTATE hunting
                                   # (field 2026-06-09); must be ≥ FTC FollowPath
                                   # max_goal_angle_error (12° = 0.21 rad)
    coverage_xy_tolerance: 0.10    # metres — for coverage waypoints
    progress_timeout_sec: 60.0     # seconds without progress before recovery

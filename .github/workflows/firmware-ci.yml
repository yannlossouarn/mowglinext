name: Firmware CI

on:
  push:
    # Build-check feature branches too (the GUI flashes firmware FROM the branch
    # source via `platformio run`, so a branch must compile before it can be
    # flashed). Mirrors ros2-ci.yml's branch set.
    branches: [main, dev, 'feat/**', 'fix/**', 'refactor/**', 'chore/**', 'perf/**']
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-ci.yml'
  pull_request:
    paths:
      - 'firmware/**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment:
          - Yardforce500
          - Yardforce500B
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ matrix.environment }}-${{ hashFiles('firmware/stm32/ros_usbnode/platformio.ini') }}
          restore-keys: |
            pio-${{ matrix.environment }}-

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware (${{ matrix.environment }})
        run: pio run -e ${{ matrix.environment }}
        working-directory: firmware/stm32/ros_usbnode

      # Upload the built binary so a branch's firmware can be downloaded and
      # flashed (e.g. via the Pi's openocd/ST-Link) without a local toolchain.
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.environment }}
          path: |
            firmware/stm32/ros_usbnode/.pio/build/${{ matrix.environment }}/firmware.bin
            firmware/stm32/ros_usbnode/.pio/build/${{ matrix.environment }}/firmware.elf
          if-no-files-found: warn

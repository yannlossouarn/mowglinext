name: ROS2 — Docker

on:
  push:
    branches: [main, dev, 'feat/**']
    tags:
      - "v*.*.*"
    paths:
      - 'ros2/**'
      - '.github/workflows/ros2-docker.yml'
  workflow_dispatch:
    inputs:
      no-cache:
        description: 'Build without Docker layer cache'
        type: boolean
        default: false

concurrency:
  group: ros2-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}/mowgli-ros2

jobs:
  # ─── Build each (target x arch) on native runners ──────────────────────────
  build:
    name: Build ${{ matrix.target }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        target: [runtime]
        arch: [linux/amd64, linux/arm64]
        include:
          - target: runtime
            suffix: ""
          - arch: linux/amd64
            runner: ubuntu-24.04
          - arch: linux/arm64
            runner: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}${{ matrix.suffix }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./ros2
          target: ${{ matrix.target }}
          platforms: ${{ matrix.arch }}
          build-args: |
            BUILD_TYPE=Release
          no-cache: ${{ inputs.no-cache == true }}
          cache-from: ${{ inputs.no-cache != true && format('type=registry,ref={0}{1}:buildcache-{2}', env.IMAGE_NAME, matrix.suffix, matrix.arch == 'linux/arm64' && 'arm64' || 'amd64') || '' }}
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}${{ matrix.suffix }}:buildcache-${{ matrix.arch == 'linux/arm64' && 'arm64' || 'amd64' }},mode=max
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE_NAME }}${{ matrix.suffix }},push-by-digest=true,name-canonical=true,push=true
          provenance: true
          sbom: true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Sanitise arch name for artifact
        run: |
          clean=${{ matrix.arch }}
          clean=${clean////-}
          echo "ARTIFACT_NAME=${clean}" >> "$GITHUB_ENV"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-ros2-${{ matrix.target }}-${{ env.ARTIFACT_NAME }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ─── Merge per-arch digests into multi-arch manifest ────────────────────────
  merge:
    name: Merge manifest (${{ matrix.target }})
    runs-on: ubuntu-24.04
    needs: build

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: runtime
            suffix: ""

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digests-ros2-${{ matrix.target }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}${{ matrix.suffix }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}${{ matrix.suffix }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}${{ matrix.suffix }}:${{ steps.meta.outputs.version }}

  # ─── Notify on failure ─────────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-24.04
    needs: [build, merge]
    if: failure() && github.ref == 'refs/heads/main'

    steps:
      - name: Create GitHub issue on repeated failure
        uses: actions/github-script@v9
        with:
          script: |
            const title = `ROS2 Docker build failed — ${new Date().toISOString().split('T')[0]}`;
            const body = `The ROS2 Docker workflow failed on \`main\`.\n\n` +
              `Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
            });
            if (!issues.data.some(i => i.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure'],
              });
            }

name: Claude Code Review

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  review:
    runs-on: ubuntu-24.04
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-6
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Review this pull request for the MowgliNext project (open-source ROS2 autonomous robot mower).

            Review the changes for:
            1. **Safety** — This is a robot with blades. Flag anything that could cause unsafe physical behavior.
            2. **Correctness** — Logic errors, race conditions, missing error handling
            3. **ROS2 best practices** — Proper node lifecycle, QoS settings, parameter usage
            4. **Code quality** — Naming, structure, unnecessary complexity
            5. **Breaking changes** — Will this break existing deployments?

            Be concise. Focus on actionable items. Use the format:
            - 🔴 **Critical**: Must fix before merge
            - 🟡 **Suggestion**: Recommended improvement
            - 🟢 **Nice**: Looks good, optional polish

            If the PR looks good, say so briefly. Don't nitpick.
          timeout_minutes: 10

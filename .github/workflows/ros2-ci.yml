name: ROS2 — CI

on:
  push:
    branches: [main, dev, 'feat/**', 'fix/**', 'refactor/**', 'chore/**', 'perf/**']
    paths:
      - 'ros2/**'
      - '.github/workflows/ros2-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ros2/**'
      - '.github/workflows/ros2-ci.yml'

concurrency:
  group: ros2-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ROS_DISTRO: kilted

jobs:
  # ─── Build & Test ────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (ROS2 ${{ matrix.ros_distro }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: kilted
            ubuntu: "24.04"

    defaults:
      run:
        working-directory: ros2

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # opennav_coverage is a git submodule providing opennav_coverage_msgs
          # (a source package in the workspace). Without it checked out, rosdep
          # can't see it as a source dep and `rosdep install --ignore-src`
          # fails with "Cannot locate rosdep definition for
          # [opennav_coverage_msgs]", blocking the build+test. (ros2-docker.yml
          # already checks out submodules; this CI didn't — so tests never ran.)
          submodules: recursive

      - name: Setup ROS2 ${{ matrix.ros_distro }}
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.ros_distro }}

      # GTSAM 4.3a1 is required by fusion_graph (find_package(GTSAM CONFIG
      # REQUIRED) in its CMakeLists). The Ubuntu apt package ships 4.2 with
      # a broken GTSAMConfig.cmake AND the legacy boost::optional<Matrix&>
      # custom-factor API, so the Docker image build (ros2/Dockerfile stage 0)
      # builds 4.3a1 from source and lands it under /opt/gtsam. We mirror the
      # same recipe here, cached so subsequent runs are instant.
      - name: Cache GTSAM build
        id: cache-gtsam
        uses: actions/cache@v4
        with:
          path: /opt/gtsam
          key: gtsam-4.3a1-${{ runner.os }}-noble

      - name: Build GTSAM 4.3a1 from source
        working-directory: .
        if: steps.cache-gtsam.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git \
            libboost-all-dev libeigen3-dev libmetis-dev
          cd /tmp
          git clone --depth 1 -b 4.3a1 https://github.com/borglab/gtsam.git
          cd gtsam && mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/opt/gtsam \
            -DGTSAM_BUILD_TESTS=OFF \
            -DGTSAM_BUILD_EXAMPLES_ALWAYS=OFF \
            -DGTSAM_BUILD_PYTHON=OFF \
            -DGTSAM_BUILD_UNSTABLE=OFF \
            -DGTSAM_USE_SYSTEM_EIGEN=ON \
            -DGTSAM_USE_SYSTEM_METIS=ON \
            -DGTSAM_WITH_TBB=OFF \
            -DGTSAM_WITH_EIGEN_MKL=OFF \
            -DGTSAM_INSTALL_MATLAB_TOOLBOX=OFF \
            -DBUILD_SHARED_LIBS=ON
          sudo make -j$(nproc) install
          # The ldconfig + CMAKE_PREFIX_PATH setup is done in subsequent
          # steps so that cached restores also see the library.

      - name: Register GTSAM in linker + CMake search paths
        run: |
          echo "/opt/gtsam/lib" | sudo tee /etc/ld.so.conf.d/gtsam.conf
          sudo ldconfig
          echo "CMAKE_PREFIX_PATH=/opt/gtsam:$CMAKE_PREFIX_PATH" >> $GITHUB_ENV
          echo "GTSAM_DIR=/opt/gtsam/lib/cmake/GTSAM" >> $GITHUB_ENV
          # Pre-install runtime apt deps that GTSAM links against (boost,
          # eigen, metis), in case the cache restore skipped the apt step.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libboost-all-dev libeigen3-dev libmetis-dev

      # Fields2Cover 2.0.0 — mowgli_coverage pins
      #   find_package(Fields2Cover 2.0.0 REQUIRED PATHS /opt/fields2cover-200)
      # No v2 debian on Noble, so the Docker image (Dockerfile stage 0b) builds
      # it from source; mirror that here (cached) or the workspace build fails
      # at mowgli_coverage.
      - name: Cache Fields2Cover build
        id: cache-f2c
        uses: actions/cache@v4
        with:
          path: /opt/fields2cover-200
          key: f2c-2.0.0-${{ runner.os }}-noble

      - name: Build Fields2Cover 2.0.0 from source
        working-directory: .
        if: steps.cache-f2c.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git pkg-config \
            libeigen3-dev libgdal-dev libgeos++-dev libgeos-dev libgsl-dev \
            libtinyxml2-dev libpython3-dev python3-dev libtbb-dev \
            ros-${{ matrix.ros_distro }}-ortools-vendor
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          cd /tmp
          git clone --depth 1 -b v2.0.0 https://github.com/Fields2Cover/Fields2Cover.git f2c
          cd f2c && mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/opt/fields2cover-200 \
            -DBUILD_TESTS=OFF \
            -DBUILD_PYTHON=OFF \
            -DBUILD_TUTORIALS=OFF \
            -DBUILD_DOC=OFF \
            -DALLOW_PARALLELIZATION=ON \
            -DBUILD_SHARED_LIBS=ON
          sudo make -j$(nproc) install

      - name: Register Fields2Cover in linker + CMake search paths
        run: |
          # Runtime/link deps mowgli_coverage needs against F2C (the build apt
          # deps above cover these, but a cache-restore skips that step).
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libgeos-dev libgeos++-dev libtinyxml2-dev \
            ros-${{ matrix.ros_distro }}-ortools-vendor
          echo "/opt/fields2cover-200/lib" | sudo tee /etc/ld.so.conf.d/f2c.conf
          sudo ldconfig
          echo "CMAKE_PREFIX_PATH=/opt/fields2cover-200:$CMAKE_PREFIX_PATH" >> $GITHUB_ENV

      - name: Cache rosdep
        uses: actions/cache@v4
        with:
          path: ~/.ros/rosdep
          key: rosdep-${{ matrix.ros_distro }}-${{ hashFiles('ros2/src/**/package.xml') }}
          restore-keys: |
            rosdep-${{ matrix.ros_distro }}-

      # Only opennav_coverage_msgs (the action types) is used from the
      # opennav_coverage submodule; the upstream server subpackages are pinned
      # to F2C 1.2.1 and must NOT be built (they #include fields2cover.h from
      # the v1 install). The Docker image drops the same COLCON_IGNORE markers
      # (Dockerfile stage); mirror that here or opennav_coverage fails the build.
      - name: COLCON_IGNORE upstream opennav_coverage subpackages
        run: |
          for p in opennav_coverage opennav_coverage_bt opennav_coverage_demo \
                   opennav_coverage_navigator opennav_row_coverage; do
            touch "src/opennav_coverage/$p/COLCON_IGNORE" 2>/dev/null || true
          done

      - name: Install rosdep dependencies
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          sudo apt-get update
          rosdep update --rosdistro ${{ matrix.ros_distro }}
          # skip-keys: the opennav_coverage server subpackages are
          # COLCON_IGNORE'd (only _msgs is used), but mowgli_bringup still
          # exec_depends on opennav_coverage — rosdep can't resolve a key for
          # a package it now skips, so tell it not to try. Real missing deps
          # still fail the step (unlike the Dockerfile's `|| true`).
          rosdep install \
            --from-paths src \
            --ignore-src \
            --rosdistro ${{ matrix.ros_distro }} \
            --skip-keys "opennav_coverage opennav_coverage_bt opennav_coverage_demo opennav_coverage_navigator opennav_row_coverage" \
            -y

      - name: Cache colcon workspace
        uses: actions/cache@v4
        with:
          path: |
            ros2/build
            ros2/install
            ros2/log
          key: colcon-v2-${{ matrix.ros_distro }}-${{ hashFiles('ros2/src/**/CMakeLists.txt', 'ros2/src/**/package.xml', 'ros2/src/**/*.cpp', 'ros2/src/**/*.hpp') }}
          restore-keys: |
            colcon-v2-${{ matrix.ros_distro }}-

      - name: Build workspace
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          colcon build \
            --cmake-args -DCMAKE_BUILD_TYPE=Release \
            --parallel-workers $(nproc) \
            --event-handlers console_cohesion+

      - name: Run tests
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source install/setup.bash
          colcon test \
            --return-code-on-test-failure \
            --event-handlers console_cohesion+
          colcon test-result --verbose

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.ros_distro }}
          path: |
            ros2/build/**/test_results/**/*.xml
            ros2/log/latest_test/**
          retention-days: 14

  # ─── Formatting Check ────────────────────────────────────────────────────────
  format-check:
    name: Formatting (clang-format)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install clang-format + git-clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/clang-format

      # Check only the LINES CHANGED versus the merge-base with main, not the
      # whole tree. The legacy tree is not fully clang-format-clean, so a
      # whole-tree --Werror check is permanently red and useless as a gate;
      # git-clang-format diffs only the touched lines, so this passes when the
      # current change is clean and flags only NEW violations.
      - name: Check formatting (changed lines)
        run: |
          git fetch --no-tags --depth=200 origin main || git fetch --no-tags origin main || true
          BASE=$(git merge-base origin/main HEAD 2>/dev/null || true)
          if [ -z "$BASE" ]; then
            echo "No merge-base with origin/main — skipping."
            exit 0
          fi
          DIFF=$(git-clang-format-18 --binary clang-format-18 \
                   --style=file:ros2/.clang-format --diff "$BASE" -- \
                   ros2/src 2>/dev/null || true)
          case "$DIFF" in
            ""|"no modified files to format"|"clang-format did not modify any files")
              echo "Changed lines are correctly formatted." ;;
            *)
              echo "$DIFF"
              echo "::error::Changed lines are not clang-format clean (run 'make format' / git clang-format)."
              exit 1 ;;
          esac

  # ─── Static Analysis ─────────────────────────────────────────────────────────
  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      # Report-only on the CHANGED files versus main. The legacy tree carries
      # cppcheck findings we haven't triaged, so this is informational
      # (continue-on-error) and scoped to what the current change touched —
      # surfaces new findings in the log/artifact without permanently
      # red-gating the workflow. Tighten to a hard gate once the legacy
      # findings are cleared.
      - name: Run cppcheck (changed files, report-only)
        continue-on-error: true
        run: |
          git fetch --no-tags --depth=200 origin main || git fetch --no-tags origin main || true
          BASE=$(git merge-base origin/main HEAD 2>/dev/null || true)
          if [ -n "$BASE" ]; then
            FILES=$(git diff --name-only --diff-filter=ACMR "$BASE" HEAD -- 'ros2/src/' \
              | grep -E '\.(cpp|hpp)$' | grep -v '/test/' | grep -v '/opennav_coverage/' || true)
          else
            FILES=$(find ros2/src/ \( -name "*.cpp" -o -name "*.hpp" \) \
              -not -path "*/test/*" -not -path "*/opennav_coverage/*")
          fi
          if [ -z "$FILES" ]; then
            echo "No changed C++ files — skipping."
            exit 0
          fi
          echo "cppcheck on changed files:"; echo "$FILES"
          # Common cppcheck flags. --inline-suppr lets us silence narrow false
          # positives at the call-site with `// cppcheck-suppress <id>` comments
          # rather than maintaining a global suppress list.
          # Global suppressions for known false positives that aren't worth
          # an inline annotation:
          #   - useInitializationList: ROS2 nodes commonly assign members
          #     (callback groups, QoS, paths read from declare_parameter) in
          #     the body because those calls require the rclcpp::Node
          #     constructor to have run first.
          CPPCHECK_FLAGS=(
            --enable=warning,performance,portability
            --inline-suppr
            --suppress=missingInclude
            --suppress=unmatchedSuppression
            --suppress=useInitializationList
            --suppress=normalCheckLevelMaxBranches
            --error-exitcode=1
          )
          echo "$FILES" | xargs cppcheck "${CPPCHECK_FLAGS[@]}" --xml 2>cppcheck-report.xml
          echo "$FILES" | xargs cppcheck "${CPPCHECK_FLAGS[@]}" --quiet

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cppcheck-report
          path: cppcheck-report.xml
          if-no-files-found: ignore
          retention-days: 7

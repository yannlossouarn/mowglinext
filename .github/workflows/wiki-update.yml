name: Suggest Wiki Updates

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize]
    paths-ignore:
      - 'wiki/**'
      - 'docs/**'
      - '*.md'
      - '.github/workflows/wiki-*.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: wiki-update-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  suggest:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 50

      - name: Generate wiki updates
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-6
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          timeout_minutes: 15
          direct_prompt: |
            You are updating the MowgliNext wiki to reflect the changes in this PR.

            1. Run `git diff origin/main...HEAD` to see what changed in this PR.
            2. Read the current wiki pages in `wiki/` to understand existing documentation.
            3. Read `CLAUDE.md` for the authoritative project state.
            4. Determine if the PR introduces something that should be documented in the wiki:
               - New features or capabilities
               - Changed deployment steps or commands
               - New configuration options
               - Architecture changes
               - New tools or workflows
            5. If there are wiki updates needed:
               - Edit the relevant files in `wiki/` directly
               - Keep the existing style and structure
               - Be concise — wiki pages should be practical references, not verbose
               - Update `_Sidebar.md` if new pages are added
            6. If no wiki updates are needed, do not make any changes.

            Do NOT create new wiki pages unless a major new feature warrants it.
            Do NOT update wiki pages just for minor bug fixes, dependency bumps, or CI tweaks.
            Focus on changes that affect how users interact with the project.
          allowed_tools: |
            Read
            Write
            Edit
            Bash(git log:*)
            Bash(git diff:*)
            Bash(git show:*)
            Glob
            Grep

      - name: Commit wiki updates to PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard wiki/)" ]; then
            echo "No wiki updates needed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wiki/
          git commit -m "docs: update wiki for PR changes"
          git push origin "HEAD:refs/heads/$HEAD_REF"

# -------------------------------------------------------------------------
# Unicore GNSS backend.
#
# Mirrors the docker-compose.gps.yml fragment so all GNSS backends share
# the same shape:
#   * privileged + /dev mounted so the udev /dev/gps symlink (UART or USB)
#     is visible inside the container regardless of how the receiver is
#     wired
#   * /config mount points at docker/config/mowgli (NOT .../mowgli) so
#     start_gps.sh can read /config/mowgli_robot.yaml directly
#   * dedicated UNICORE_IMAGE — the unicore container is built from a
#     separate Dockerfile (sensors/unicore) with the Unicore GNSS driver +
#     ntrip_client, not the main mowgli-ros2 image
#   * x-ros2-env anchor + cyclonedds.xml so MaxAutoParticipantIndex=500
#     applies (same as the gps + ublox fragments)
#
# The container's CMD (`/start_gps.sh`) is intentionally left as-is —
# it reads gps_port / gps_baudrate / ntrip_* from /config/mowgli_robot.yaml
# and runs `ros2 run ${UNICORE_ROS_PACKAGE} ${UNICORE_ROS_EXECUTABLE}` +
# `ros2 run ntrip_client_node ntrip_client_node` directly. Defaults are
# unicore_gnss / unicore_node (see install/lib/env.sh). Do NOT override
# `command:` here with a `ros2 launch mowgli_bringup ...` invocation:
# there is no unicore launch file in mowgli_bringup, and the Unicore
# packages aren't in the mowgli-ros2 image anyway.
# -------------------------------------------------------------------------
x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  ROS_AUTOMATIC_DISCOVERY_RANGE: LOCALHOST
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"
  CYCLONEDDS_URI: file:///cyclonedds.xml

services:
  gnss_unicore:
    container_name: mowgli-gps
    image: ${UNICORE_IMAGE}
    network_mode: host
    ipc: host
    privileged: true

    environment:
      <<: *ros2-env

      HARDWARE_BACKEND: ${HARDWARE_BACKEND}

      UNICORE_TARGET_BAUD: ${UNICORE_TARGET_BAUD}
      UNICORE_PROFILE: ${UNICORE_PROFILE}
      UNICORE_OUTPUT_FORMAT: ${UNICORE_OUTPUT_FORMAT}
      UNICORE_COM_PORT: ${UNICORE_COM_PORT}
      UNICORE_SIGNALGROUP_OVERRIDE: ${UNICORE_SIGNALGROUP_OVERRIDE}

      UNICORE_MAIN_LOG_PERIOD: ${UNICORE_MAIN_LOG_PERIOD}
      UNICORE_BESTNAV_LOG_PERIOD: ${UNICORE_BESTNAV_LOG_PERIOD}
      UNICORE_DIAGNOSTIC_LOG_PERIOD: ${UNICORE_DIAGNOSTIC_LOG_PERIOD}
      UNICORE_SATELLITE_LOG_PERIOD: ${UNICORE_SATELLITE_LOG_PERIOD}
      UNICORE_RF_LOG_PERIOD: ${UNICORE_RF_LOG_PERIOD}
      UNICORE_RAW_LOG_PERIOD: ${UNICORE_RAW_LOG_PERIOD}

      UNICORE_ENABLE_SATELLITES: ${UNICORE_ENABLE_SATELLITES}
      UNICORE_ENABLE_RF: ${UNICORE_ENABLE_RF}
      UNICORE_ENABLE_JAMMING: ${UNICORE_ENABLE_JAMMING}
      UNICORE_ENABLE_HARDWARE: ${UNICORE_ENABLE_HARDWARE}
      UNICORE_ENABLE_GGAH: ${UNICORE_ENABLE_GGAH}
      UNICORE_ENABLE_RAW_OBSERVATIONS: ${UNICORE_ENABLE_RAW_OBSERVATIONS}

      UNICORE_ENABLE_UNICORE_BINARY: ${UNICORE_ENABLE_UNICORE_BINARY}
      UNICORE_USE_BINARY_NAV: ${UNICORE_USE_BINARY_NAV}
      UNICORE_USE_BINARY_SATELLITE_DIAG: ${UNICORE_USE_BINARY_SATELLITE_DIAG}
      UNICORE_USE_BINARY_RTCM_DIAG: ${UNICORE_USE_BINARY_RTCM_DIAG}
      UNICORE_USE_BINARY_RTK_DIAG: ${UNICORE_USE_BINARY_RTK_DIAG}
      UNICORE_USE_BINARY_RF_DIAG: ${UNICORE_USE_BINARY_RF_DIAG}
      UNICORE_USE_BINARY_HW_DIAG: ${UNICORE_USE_BINARY_HW_DIAG}
      UNICORE_USE_BINARY_JAMMING_DIAG: ${UNICORE_USE_BINARY_JAMMING_DIAG}
      UNICORE_ENABLE_RAW_OBSERVATION_DIAG: ${UNICORE_ENABLE_RAW_OBSERVATION_DIAG}
      UNICORE_USE_BINARY_RAW_OBSERVATIONS: ${UNICORE_USE_BINARY_RAW_OBSERVATIONS}

      UNICORE_ROS_PACKAGE: ${UNICORE_ROS_PACKAGE}
      UNICORE_ROS_EXECUTABLE: ${UNICORE_ROS_EXECUTABLE}

    volumes:
      - /dev:/dev
      - ./docker/config/mowgli:/config:ro
      - ./docker/config/cyclonedds.xml:/cyclonedds.xml:ro

    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m
